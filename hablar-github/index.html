<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#262421"/>
<title>Hablar · Learn Spanish for Real Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f5f2; --surface:#ffffff; --surface-2:#f2f0ec; --elevated:#ffffff;
  --text:#191714; --text-soft:#6b6660; --text-faint:#9a948c; --line:#e8e4dd;
  --accent:#e0533d; --accent-soft:#fce9e4; --accent-ink:#b93c29;
  --cuba:#d1495b; --cuba-soft:#fbe6e9; --colombia:#e9b949; --colombia-soft:#fdf3d8;
  --teal:#2a9d8f; --teal-soft:#dcf0ed; --violet:#7b6cd9; --violet-soft:#eae7fb;
  --good:#2f9e6f; --good-soft:#dcf1e8; --bad:#d1495b; --bad-soft:#fbe6e9;
  --shadow:0 1px 2px rgba(25,23,20,.04),0 8px 24px rgba(25,23,20,.06);
  --shadow-lg:0 4px 12px rgba(25,23,20,.08),0 24px 48px rgba(25,23,20,.12);
  --r:18px; --r-lg:26px; --r-sm:12px;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --serif:'Fraunces',Georgia,serif;
}
[data-theme="dark"]{
  /* warm greige — soft gray-brown, not black */
  --bg:#262421; --surface:#302d29; --surface-2:#3a352f; --elevated:#332f2b;
  --text:#efe9df; --text-soft:#aca498; --text-faint:#7d7566; --line:#3d382f;
  --accent:#ec7a5f; --accent-soft:#3a2b25; --accent-ink:#f3a892;
  --cuba:#d97487; --cuba-soft:#39282c; --colombia:#d9b45f; --colombia-soft:#352f20;
  --teal:#4bb3a3; --teal-soft:#1e332f; --violet:#a294e6; --violet-soft:#2a2540;
  --good:#5cc191; --good-soft:#1f332a; --bad:#dd7488; --bad-soft:#392830;
  --shadow:0 1px 2px rgba(0,0,0,.26),0 10px 26px rgba(0,0,0,.32);
  --shadow-lg:0 6px 16px rgba(0,0,0,.38),0 24px 50px rgba(0,0,0,.48);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
::selection{background:var(--accent-soft);color:var(--accent-ink)}
#root{max-width:760px;margin:0 auto;min-height:100vh;position:relative;
  background:var(--bg);padding-bottom:96px}
@media(min-width:760px){#root{border-left:1px solid var(--line);border-right:1px solid var(--line)}}

/* ---------- Top bar ---------- */
.topbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:34px;height:34px;border-radius:11px;background:var(--accent);
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;box-shadow:var(--shadow)}
.streak-chip svg{color:var(--accent)}
.brand-name{font-family:var(--serif);font-weight:600;font-size:19px;letter-spacing:-.01em}
.brand-name small{font-family:var(--sans);font-weight:500;font-size:11px;color:var(--text-faint);
  display:block;letter-spacing:.02em;margin-top:-2px}
.topbar-right{display:flex;align-items:center;gap:8px}
.streak-chip{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:6px 12px;font-weight:700;font-size:13px;box-shadow:var(--shadow)}
.icon-btn{width:38px;height:38px;border-radius:12px;background:var(--surface);border:1px solid var(--line);
  display:grid;place-items:center;font-size:16px;box-shadow:var(--shadow);transition:transform .15s}
.icon-btn:active{transform:scale(.92)}

/* ---------- Bottom nav ---------- */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:760px;z-index:50;
  background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:saturate(180%) blur(16px);
  border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;
  border-radius:14px;color:var(--text-faint);font-weight:600;font-size:10.5px;transition:color .2s}
.navbtn .ni{font-size:21px;line-height:1;transition:transform .2s;display:grid;place-items:center}
.navbtn .ni svg{width:23px;height:23px}
.navbtn.on{color:var(--accent)}
.navbtn.on .ni{transform:translateY(-2px) scale(1.06)}

/* ---------- Generic ---------- */
.page{padding:20px 20px 8px;animation:rise .4s cubic-bezier(.2,.7,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.h-hello{font-family:var(--serif);font-size:28px;font-weight:600;letter-spacing:-.02em;line-height:1.1}
.h-sub{color:var(--text-soft);font-size:14px;margin-top:6px;line-height:1.5}
.sec-title{font-family:var(--serif);font-size:20px;font-weight:600;letter-spacing:-.01em;margin:26px 2px 12px}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--text-faint)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}

/* ---------- Home dashboard ---------- */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 12px;box-shadow:var(--shadow)}
.stat .n{font-family:var(--serif);font-size:26px;font-weight:700;line-height:1}
.stat .l{font-size:11px;color:var(--text-soft);margin-top:5px;font-weight:600}
.goal-card{margin-top:14px;padding:18px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-lg);color:var(--text);box-shadow:var(--shadow);position:relative;overflow:hidden}
.goal-card h3{font-family:var(--serif);font-size:19px;font-weight:600;margin-bottom:3px}
.goal-card p{font-size:13px;color:var(--text-soft);margin-bottom:14px}
.goal-bar{height:9px;background:var(--surface-2);border-radius:99px;overflow:hidden}
.goal-bar>div{height:100%;background:var(--accent);border-radius:99px;transition:width .6s cubic-bezier(.2,.7,.3,1)}
.goal-meta{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-top:9px;color:var(--text-soft)}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.quick{padding:16px;border-radius:var(--r);text-align:left;box-shadow:var(--shadow);border:1px solid var(--line);
  background:var(--surface);transition:transform .15s,box-shadow .2s;display:flex;flex-direction:column;gap:8px;min-height:112px}
.quick:active{transform:scale(.97)}
.quick .qi{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:20px;background:var(--surface-2);color:var(--accent-ink)}
.quick .qi svg{width:22px;height:22px}
.quick .qt{font-weight:700;font-size:15px;letter-spacing:-.01em}
.quick .qd{font-size:12px;color:var(--text-soft);line-height:1.4}
.list-link{display:flex;align-items:center;gap:13px;padding:14px 16px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-top:10px;transition:transform .15s}
.list-link:active{transform:scale(.98)}
.list-link .li{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;background:var(--surface-2);color:var(--accent-ink)}
.list-link .li svg{width:22px;height:22px}
.list-link .lt{font-weight:700;font-size:15px}
.list-link .ld{font-size:12.5px;color:var(--text-soft);margin-top:2px}
.list-link .chev{margin-left:auto;color:var(--text-faint);font-size:18px}
.phrase-of-day{margin-top:14px;padding:18px;border-radius:var(--r-lg);background:var(--surface);
  border:1px solid var(--line);box-shadow:var(--shadow)}
.phrase-of-day .es{font-family:var(--serif);font-size:23px;font-weight:600;letter-spacing:-.01em;cursor:pointer}
.phrase-of-day .en{color:var(--text-soft);font-size:14px;margin-top:4px}
.phrase-of-day .note{font-size:12.5px;color:var(--text-soft);margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);line-height:1.5}

/* ---------- Chips / segmented ---------- */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chips.wrap{flex-wrap:wrap;overflow:visible}
.chip{white-space:nowrap;padding:8px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line);
  font-weight:600;font-size:13px;color:var(--text-soft);transition:all .18s;flex-shrink:0}
.chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.seg{display:flex;background:var(--surface-2);border-radius:999px;padding:4px;gap:4px;margin:4px 0 4px}
.seg button{flex:1;padding:9px;border-radius:999px;font-weight:700;font-size:13px;color:var(--text-soft);transition:all .18s}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

/* ---------- Search ---------- */
.search{position:relative;margin:4px 0 6px}
.search input{width:100%;padding:12px 16px 12px 42px;border-radius:999px;background:var(--surface);
  border:1px solid var(--line);font-size:14px;color:var(--text);outline:none;box-shadow:var(--shadow)}
.search input::placeholder{color:var(--text-faint)}
.search .si{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.6}

/* ---------- Flashcards (learn) ---------- */
.deck-head{display:flex;align-items:baseline;justify-content:space-between;margin:2px 2px 4px}
.deck-head .cnt{font-size:12.5px;color:var(--text-soft);font-weight:600}
.fc-stage{perspective:1400px;margin:10px 0}
.fc{position:relative;width:100%;height:340px;transition:transform .55s cubic-bezier(.2,.8,.3,1);
  transform-style:preserve-3d;cursor:pointer}
.fc.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:var(--r-lg);border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 26px;text-align:center}
.fc-back{transform:rotateY(180deg)}
.fc-tag{position:absolute;top:16px;left:16px;font-size:11px;font-weight:800;letter-spacing:.05em;
  text-transform:uppercase;padding:5px 11px;border-radius:999px}
.fc-emoji{font-size:52px;margin-bottom:14px}
.fc-es{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:1.15}
.fc-pron{font-size:13px;color:var(--text-faint);margin-top:10px;font-style:italic}
.fc-en{font-size:19px;font-weight:600;color:var(--accent-ink)}
.fc-ex{font-family:var(--serif);font-size:19px;font-weight:500;line-height:1.4;margin:6px 0 12px}
.fc-note{font-size:13px;color:var(--text-soft);line-height:1.5;max-width:90%}
.fc-hint{position:absolute;bottom:16px;font-size:12px;color:var(--text-faint);font-weight:600}
.speak-pill{margin-top:16px;display:inline-flex;align-items:center;gap:7px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-weight:700;font-size:13px}
.fc-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.fc-btn{padding:15px;border-radius:var(--r);font-weight:800;font-size:14px;display:flex;
  align-items:center;justify-content:center;gap:7px;transition:transform .12s;border:1px solid transparent}
.fc-btn:active{transform:scale(.96)}
.fc-btn.again{background:var(--bad-soft);color:var(--bad);border-color:color-mix(in srgb,var(--bad) 25%,transparent)}
.fc-btn.got{background:var(--good-soft);color:var(--good);border-color:color-mix(in srgb,var(--good) 25%,transparent)}
.fc-progress{height:6px;background:var(--surface-2);border-radius:99px;overflow:hidden;margin:2px 0 14px}
.fc-progress>div{height:100%;background:var(--accent);transition:width .4s}
.done-card{text-align:center;padding:44px 24px}
.done-card .big{font-size:60px;margin-bottom:10px}
.done-card h2{font-family:var(--serif);font-size:26px;font-weight:600;margin-bottom:8px}
.done-card p{color:var(--text-soft);font-size:14px;margin-bottom:20px;line-height:1.5}

/* ---------- Grid cards (browse) ---------- */
.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px;margin-top:8px}
.bcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 14px;
  box-shadow:var(--shadow);transition:transform .15s,box-shadow .2s;cursor:pointer;position:relative}
.bcard:active{transform:scale(.97)}
.bcard .be{font-size:26px}
.bcard .bp{font-family:var(--serif);font-size:16px;font-weight:600;margin-top:8px;letter-spacing:-.01em;line-height:1.25}
.bcard .bt{font-size:12.5px;color:var(--text-soft);margin-top:5px;line-height:1.35}
.bcard .bspk{position:absolute;top:12px;right:12px;font-size:15px;opacity:.5}

/* ---------- Scenarios ---------- */
.scn-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);
  overflow:hidden;margin-bottom:14px;transition:transform .15s}
.scn-card:active{transform:scale(.99)}
.scn-top{padding:18px 18px 16px;position:relative;overflow:hidden;background:var(--surface-2);border-bottom:1px solid var(--line)}
.scn-top .lvl{position:absolute;top:14px;right:16px;font-size:11px;font-weight:800;letter-spacing:.05em;
  text-transform:uppercase;background:var(--surface);color:var(--text-faint);border:1px solid var(--line);padding:4px 10px;border-radius:999px}
.scn-top h3{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.01em;max-width:80%}
.scn-top p{font-size:13px;color:var(--text-soft);margin-top:4px}
.scn-foot{padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--text-soft);font-weight:600}
.scn-foot .done-badge{margin-left:auto;color:var(--good);font-weight:700;display:flex;align-items:center;gap:4px}
/* roleplay */
.rp-wrap{padding:4px 0 8px}
.rp-scene{background:var(--surface-2);border-radius:var(--r);padding:14px 16px;font-size:13.5px;
  color:var(--text-soft);line-height:1.5;margin-bottom:16px;border:1px dashed var(--line)}
.bubble-row{display:flex;margin-bottom:14px;animation:rise .35s ease}
.bubble-row.me{justify-content:flex-end}
.who-tag{font-size:11px;font-weight:800;letter-spacing:.03em;color:var(--text-faint);margin-bottom:4px;padding:0 4px}
.bubble{max-width:82%;padding:13px 16px;border-radius:20px;box-shadow:var(--shadow)}
.bubble.them{background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:6px}
.bubble.me-b{background:var(--accent);color:#fff;border-bottom-right-radius:6px}
.bubble .b-es{font-size:15px;font-weight:600;cursor:pointer}
.bubble.them .b-es{font-family:var(--serif);font-weight:600}
.bubble .b-en{font-size:12.5px;opacity:.82;margin-top:4px}
.bubble .b-tip{font-size:12px;margin-top:8px;padding-top:8px;border-top:1px solid var(--line);color:var(--text-soft);line-height:1.45}
.choices{margin-top:6px}
.choice{width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);transition:all .16s}
.choice:active{transform:scale(.98)}
.choice .c-es{font-weight:700;font-size:15px}
.choice .c-en{font-size:12.5px;color:var(--text-soft);margin-top:2px}
.choice.correct{background:var(--good-soft);border-color:var(--good)}
.choice.wrong{background:var(--bad-soft);border-color:var(--bad);opacity:.85}
.rp-feedback{padding:14px 16px;border-radius:16px;font-size:13.5px;line-height:1.5;margin-bottom:14px}
.rp-feedback.ok{background:var(--good-soft);color:var(--good)}
.rp-feedback.no{background:var(--bad-soft);color:var(--bad)}
.rp-cta{width:100%;padding:15px;border-radius:16px;background:var(--text);color:var(--bg);font-weight:800;font-size:15px;
  margin-top:4px;transition:transform .12s}
.rp-cta:active{transform:scale(.98)}

/* ---------- Listening ---------- */
.listen-card{text-align:center;padding:8px 4px}
.big-speak{width:118px;height:118px;border-radius:50%;margin:14px auto 8px;
  background:var(--teal);color:#fff;display:grid;place-items:center;
  font-size:46px;box-shadow:0 12px 30px color-mix(in srgb,var(--teal) 32%,transparent);transition:transform .15s}
.big-speak svg{width:46px;height:46px}
.big-speak:active{transform:scale(.94)}
.big-speak.playing{animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.listen-hint{color:var(--text-soft);font-size:13.5px;margin-bottom:8px}
.speed-toggle{display:inline-flex;gap:6px;background:var(--surface-2);border-radius:999px;padding:4px;margin-bottom:18px}
.speed-toggle button{padding:6px 14px;border-radius:999px;font-weight:700;font-size:12.5px;color:var(--text-soft)}
.speed-toggle button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.opt{width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:15px 16px;margin-bottom:10px;box-shadow:var(--shadow);font-weight:600;font-size:14.5px;transition:all .16s}
.opt:active{transform:scale(.98)}
.opt.correct{background:var(--good-soft);border-color:var(--good);color:var(--good)}
.opt.wrong{background:var(--bad-soft);border-color:var(--bad);color:var(--bad)}
.reveal{background:var(--surface-2);border-radius:16px;padding:16px;text-align:center;margin-top:6px;animation:rise .3s ease}
.reveal .r-es{font-family:var(--serif);font-size:22px;font-weight:600;cursor:pointer}
.reveal .r-en{color:var(--text-soft);font-size:14px;margin-top:4px}

/* ---------- Verbs / reference ---------- */
.verb-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
  overflow:hidden;margin-bottom:14px}
.verb-h{padding:16px 18px;background:var(--surface-2);color:var(--text);cursor:pointer;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:between;gap:10px}
.verb-h .vt{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:.01em;color:var(--accent-ink)}
.verb-h .vm{font-size:13px;color:var(--text-soft);margin-top:1px}
.verb-h .vx{margin-left:auto;font-size:20px;color:var(--text-faint);transition:transform .3s}
.verb-h.open .vx{transform:rotate(45deg)}
.verb-body{padding:16px 18px;display:none}
.verb-body.show{display:block;animation:rise .3s ease}
.verb-when{background:var(--colombia-soft);border-radius:12px;padding:11px 14px;font-size:12.5px;
  color:var(--text);line-height:1.5;margin-bottom:14px}
.tense-block{margin-bottom:14px}
.tense-t{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--text-faint);
  margin-bottom:8px}
.conj-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.conj{background:var(--surface-2);border-radius:11px;padding:9px 11px;cursor:pointer;transition:background .15s}
.conj:active{background:var(--teal-soft)}
.conj .ce{font-weight:700;font-size:13.5px}
.conj .cn{font-size:11.5px;color:var(--text-soft);margin-top:1px}
.verb-ex{background:var(--surface-2);border-radius:12px;padding:12px 14px;margin-top:6px}
.verb-ex .veh{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px}
.verb-ex ul{list-style:none}
.verb-ex li{font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line);cursor:pointer;line-height:1.4}
.verb-ex li:last-child{border:none}

/* ---------- Pronunciation ---------- */
.accent-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:14px}
.accent-box h3{font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:12px}
.accent-row{display:flex;gap:11px;margin-bottom:11px}
.accent-flag{font-size:22px;flex-shrink:0}

const SCENARIOS = [{"id": "sunday", "cat": "family", "title": "Sunday at his mom's", "setting": "You're at Marta's for Sunday lunch, like most weekends now. Keep it warm and casual.", "level": "Casual", "grad": "linear-gradient(135deg,#e0533d,#b93c29)", "icon": "🏠", "steps": [{"who": "Marta (his mom)", "es": "¡Hola, mi amor! Llegaste. ¿Cómo estás?", "en": "Hi, sweetheart! You made it. How are you?", "q": "She greets you like family. What do you say?", "choices": [{"es": "¡Hola, Marta! Todo bien, ¿y tú?", "en": "Hi, Marta! All good, and you?", "ok": true, "fb": "Perfect — warm and casual with 'tú'. No need for 'usted'."}, {"es": "Buenas tardes, señora. ¿Cómo está usted?", "en": "Good afternoon, ma'am. (formal)", "ok": false, "fb": "Too stiff for someone you've known a year! Go casual."}, {"es": "Bien.", "en": "Good.", "ok": false, "fb": "A little flat — match her warmth and ask her back."}]}, {"who": "Marta", "es": "Bien, mi niña. Oye, ¿me ayudas con la mesa?", "en": "Good, honey. Hey, help me with the table?", "q": "She treats you like one of the family.", "choices": [{"es": "¡Claro! Dime qué hago.", "en": "Of course! Tell me what to do.", "ok": true, "fb": "Great — easygoing and helpful."}, {"es": "Sí, con mucho gusto, si no es molestia.", "en": "Yes, gladly, if it's no trouble.", "ok": false, "fb": "Too guest-like — you're past that."}]}, {"who": "Tony (her husband)", "es": "¿Qué tal el trabajo esta semana?", "en": "How was work this week?", "q": "Tony makes easy small talk.", "choices": [{"es": "Uf, con bastante trabajo, pero bien. ¿Y tú?", "en": "Ugh, busy, but good. And you?", "ok": true, "fb": "Natural, a little venting, bounced back."}, {"es": "Estuvo bien, gracias por preguntar.", "en": "It was fine, thanks for asking.", "ok": false, "fb": "A bit formal and closed. Loosen up."}]}], "win": "That's the register that fits — warm, casual 'tú', like you belong there. 🏠"}, {"id": "dinner", "cat": "family", "title": "At the dinner table", "setting": "Marta made arroz con pollo, your favorite. Everyone's eating and chatting.", "level": "Casual", "grad": "linear-gradient(135deg,#d1495b,#8e2434)", "icon": "🍽️", "steps": [{"who": "Marta", "es": "Dale, prueba y dime qué te parece.", "en": "Go on, try it and tell me.", "q": "You take a bite. So good. What do you say?", "choices": [{"es": "Mmm, ¡esto está riquísimo! Me encanta cómo lo haces.", "en": "Mmm, so good! I love how you make it.", "ok": true, "fb": "Enthusiastic and personal. She'll glow."}, {"es": "Está muy bueno, gracias.", "en": "It's very good, thanks.", "ok": false, "fb": "A bit polite-guest. Gush a little!"}]}, {"who": "Marta", "es": "¿Quieres más? No te quedes con hambre.", "en": "Want more? Don't stay hungry.", "q": "You're getting full but she's in mom-mode.", "choices": [{"es": "Un poquito más, que está buenísimo.", "en": "A little more, it's so good.", "ok": true, "fb": "A small yes makes her happy."}, {"es": "No, ya estoy llena, pero gracias. ¡Todo riquísimo!", "en": "I'm full, but thanks. Delicious!", "ok": true, "fb": "Also perfect — decline plus a compliment."}]}, {"who": "Tony", "es": "¿Y cuándo nos vas a cocinar tú algo, eh?", "en": "And when will you cook us something, huh?", "q": "Tony's teasing you, family-style.", "choices": [{"es": "¡Ja! Cuando Marta me enseñe sus secretos.", "en": "Ha! When Marta teaches me her secrets.", "ok": true, "fb": "You played along and tossed it back."}, {"es": "No sé cocinar comida cubana.", "en": "I don't know how to cook Cuban food.", "ok": false, "fb": "Too literal — he's joking! Volley back."}]}], "win": "Teasing back means you're truly in. Next weekend, cook with Marta. 🍚"}, {"id": "familytalk", "cat": "family", "title": "A real talk with family & friends", "setting": "At a get-together, his aunt Caridad waves you over. She wants to actually get to know you.", "level": "Warm", "grad": "linear-gradient(135deg,#7b6cd9,#5a4bc0)", "icon": "💛", "steps": [{"who": "Tía Caridad", "es": "Ven, siéntate conmigo. Cuéntame de ti.", "en": "Come sit with me. Tell me about yourself.", "q": "She wants to know you. Open up warmly.", "choices": [{"es": "¡Claro! ¿Qué te gustaría saber?", "en": "Of course! What would you like to know?", "ok": true, "fb": "Warm and open — she'll love that."}, {"es": "No hay mucho que contar.", "en": "There's not much to tell.", "ok": false, "fb": "Don't sell yourself short — invite her in."}]}, {"who": "Tía Caridad", "es": "¿Y cómo conociste a mi sobrino?", "en": "And how did you meet my nephew?", "q": "She wants the story. Keep it simple.", "choices": [{"es": "Nos conocimos por unos amigos, hace dos años.", "en": "We met through friends, two years ago.", "ok": true, "fb": "A real answer in the past tense."}, {"es": "Es una larga historia.", "en": "It's a long story.", "ok": false, "fb": "That closes the door — give her a little."}]}, {"who": "Tía Caridad", "es": "Nosotros llegamos de Cuba hace muchos años...", "en": "We came from Cuba many years ago...", "q": "She's sharing her story. Encourage her.", "choices": [{"es": "¿En serio? Cuéntame, me encanta escucharte.", "en": "Really? Tell me, I love listening.", "ok": true, "fb": "The best gift — someone who wants to hear her."}, {"es": "Qué interesante.", "en": "How interesting.", "ok": false, "fb": "A bit flat — lean in with 'cuéntame'."}]}], "win": "Getting the family to share their story is how you become one of them. 💛"}, {"id": "friends", "cat": "family", "title": "Meeting his friends", "setting": "His Cuban buddies are over for dominoes and beers. Keep it loose.", "level": "Slang", "grad": "linear-gradient(135deg,#2a9d8f,#146b61)", "icon": "🎉", "steps": [{"who": "Yandy (his friend)", "es": "¡Asere! Así que tú eres la famosa Jenna, ¿qué bolá?", "en": "Dude! So you're the famous Jenna — what's up?", "q": "He greets you Cuban-style. Match the vibe.", "choices": [{"es": "¡Ja! La misma. ¿Qué bolá, Yandy?", "en": "Ha! The one and only. What's up, Yandy?", "ok": true, "fb": "You rolled with the slang. Instant good vibes."}, {"es": "Encantada de conocerlo. Un placer.", "en": "Delighted to meet you. (formal)", "ok": false, "fb": "Way too formal for dominoes night!"}]}, {"who": "Yandy", "es": "Oye, ¿y tú juegas dominó o qué?", "en": "Hey, do you play dominoes or what?", "q": "He's inviting you in.", "choices": [{"es": "Estoy aprendiendo, pero le entro. ¡Dale!", "en": "I'm learning, but I'm in. Let's go!", "ok": true, "fb": "'¡Dale!' is peak Cuban. They'll love you."}, {"es": "No, prefiero solo observar.", "en": "No, I'd rather just watch.", "ok": false, "fb": "Too reserved for this crowd — jump in!"}]}, {"who": "Yandy", "es": "¡Tremendo! Tranquila que yo te enseño.", "en": "Awesome! Don't worry, I'll teach you.", "q": "Close it out warm.", "choices": [{"es": "¡Eso! Gracias, asere.", "en": "That's it! Thanks, buddy.", "ok": true, "fb": "You called him 'asere' back. One of the crew now."}, {"es": "Se lo agradezco mucho.", "en": "I appreciate it very much. (formal)", "ok": false, "fb": "Too polite — 'gracias, asere' fits."}]}], "win": "With his friends, casual and a little slang wins every time. 🎉"}, {"id": "phone", "cat": "family", "title": "Phone call with his mom", "setting": "Marta calls you directly — no translator, just you two, like always.", "level": "Casual", "grad": "linear-gradient(135deg,#e9b949,#c48a12)", "icon": "📞", "steps": [{"who": "Marta", "es": "¿Aló? Jenna, mi amor, soy Marta.", "en": "Hello? Jenna, sweetheart, it's Marta.", "q": "She's on the line. Greet her warmly.", "choices": [{"es": "¡Hola, Marta! ¿Cómo estás?", "en": "Hi, Marta! How are you?", "ok": true, "fb": "Easy and warm, just how you two talk."}, {"es": "Buenas, ¿con quién hablo?", "en": "Hello, who's speaking?", "ok": false, "fb": "She just told you — greet her by name."}]}, {"who": "Marta", "es": "Bien, mi niña. ¿Vienen a almorzar el domingo?", "en": "Good, honey. Coming for lunch Sunday?", "q": "The usual Sunday invite.", "choices": [{"es": "¡Claro! ¿Llevo algo?", "en": "Of course! Should I bring something?", "ok": true, "fb": "Easy yes plus an offer. Chef's kiss."}, {"es": "Tendré que consultar mi agenda.", "en": "I'll have to check my schedule.", "ok": false, "fb": "Too corporate for Marta! Just say yes."}]}, {"who": "Marta", "es": "Trae solo el hambre, mi vida.", "en": "Just bring your appetite, my love.", "q": "Wrap up sweetly.", "choices": [{"es": "¡Ja! Hecho. Nos vemos el domingo. Cuídate.", "en": "Ha! Done. See you Sunday. Take care.", "ok": true, "fb": "'Cuídate' fits perfectly with her."}, {"es": "Muy bien. Que tenga buen día, señora.", "en": "Very well. Have a good day, ma'am.", "ok": false, "fb": "Too formal to end a call with family!"}]}], "win": "Handling a call solo, casual and warm — that's you being family. 📞"}, {"id": "goodbye", "cat": "family", "title": "The long goodbye", "setting": "It's getting late. In Cuban families, leaving is its own event.", "level": "Casual", "grad": "linear-gradient(135deg,#d1495b,#a12f43)", "icon": "👋", "steps": [{"who": "You", "es": "", "en": "", "q": "You need to start the goodbye. How do you open?", "choices": [{"es": "Bueno, se está haciendo tarde, nos vamos yendo.", "en": "Alright, it's getting late, we should get going.", "ok": true, "fb": "Soft and casual. Now brace for 'stay longer!'"}, {"es": "Debemos retirarnos ahora.", "en": "We must take our leave now.", "ok": false, "fb": "Sounds like a business meeting!"}]}, {"who": "Marta", "es": "¿Ya? Quédense un ratico más, anda.", "en": "Already? Stay a little longer, come on.", "q": "She always says this. Handle it kindly.", "choices": [{"es": "Ay, me encantaría, pero mañana madrugo.", "en": "Aw, I'd love to, but I have an early start.", "ok": true, "fb": "A warm little reason works perfectly."}, {"es": "No, ya nos queremos ir.", "en": "No, we want to leave now.", "ok": false, "fb": "Ouch — sounds like you're not enjoying it!"}]}, {"who": "Marta", "es": "Bueno, pero llévense comida, que hice bastante.", "en": "Okay, but take some food, I made plenty.", "q": "The leftovers ritual — receive it.", "choices": [{"es": "¡Ay, gracias, mi Marta! Eres lo máximo.", "en": "Aw, thanks, my Marta! You're the best.", "ok": true, "fb": "Accept happily — refusing would hurt her."}, {"es": "No, no queremos causar molestias.", "en": "No, we don't want to be a bother.", "ok": false, "fb": "Too formal — you're family! Take the container."}]}], "win": "Say 'me siento como en familia' on your way out and watch Marta's face. ❤️"}, {"id": "arriving", "cat": "family", "title": "Arriving with a gift", "setting": "You're heading to Sunday lunch and brought a little dessert. At the door.", "level": "Casual", "grad": "linear-gradient(135deg,#e0533d,#b93c29)", "icon": "🎁", "steps": [{"who": "Marta", "es": "¡Llegaste! Pasa, pasa.", "en": "You're here! Come in, come in.", "q": "Greet her and hand over what you brought.", "choices": [{"es": "¡Hola, Marta! Les traje un postrecito.", "en": "Hi, Marta! I brought you a little dessert.", "ok": true, "fb": "Bringing something small makes a big impression."}, {"es": "Hola.", "en": "Hi.", "ok": false, "fb": "Warm it up — mention the treat you brought!"}]}, {"who": "Marta", "es": "¡Ay, no tenías que traer nada!", "en": "Oh, you didn't have to bring anything!", "q": "She'll always say this. Respond graciously.", "choices": [{"es": "Con mucho gusto, me encanta compartir.", "en": "Gladly, I love to share.", "ok": true, "fb": "Gracious and warm — perfect."}, {"es": "Sí, ya sé.", "en": "Yeah, I know.", "ok": false, "fb": "A little blunt — keep it sweet."}]}, {"who": "Marta", "es": "Gracias, mi'ja. Ponlo en la cocina.", "en": "Thanks, sweetie. Put it in the kitchen.", "q": "Offer to keep helping.", "choices": [{"es": "Claro. ¿Te ayudo con algo más?", "en": "Sure. Can I help with anything else?", "ok": true, "fb": "Offering to help right away — golden."}, {"es": "Ok.", "en": "Ok.", "ok": false, "fb": "Add a little more — offer to help!"}]}], "win": "Show up with a little something and offer to help — instant good impression. 🎁"}, {"id": "praise", "cat": "family", "title": "Praising the cook", "setting": "The food is incredible and you want Marta to know it.", "level": "Casual", "grad": "linear-gradient(135deg,#d1495b,#8e2434)", "icon": "👩‍🍳", "steps": [{"who": "Marta", "es": "¿Te gustó la comida?", "en": "Did you like the food?", "q": "Be enthusiastic.", "choices": [{"es": "¡Me encantó! ¿Qué lleva?", "en": "I loved it! What's in it?", "ok": true, "fb": "Loving it AND asking about it — big compliment."}, {"es": "Estuvo bien.", "en": "It was fine.", "ok": false, "fb": "'Fine' will deflate the cook! Gush a little."}]}, {"who": "Marta", "es": "Es una receta de familia, de Cuba.", "en": "It's a family recipe, from Cuba.", "q": "Show you value it.", "choices": [{"es": "Se nota el amor. ¿Me enseñas algún día?", "en": "You can taste the love. Teach me someday?", "ok": true, "fb": "Asking to learn her recipe = family."}, {"es": "Ah, qué bien.", "en": "Oh, nice.", "ok": false, "fb": "Lean in — ask her to teach you!"}]}, {"who": "Marta", "es": "¡Claro que sí, mi'ja!", "en": "Of course, sweetie!", "q": "Close warmly.", "choices": [{"es": "¡Gracias! Me encanta aprender de ti.", "en": "Thanks! I love learning from you.", "ok": true, "fb": "She'll treasure that."}, {"es": "Bueno.", "en": "Okay.", "ok": false, "fb": "Warm it up — thank her!"}]}], "win": "Asking to learn her recipe is the ultimate compliment. You're in. 👩‍🍳"}, {"id": "cleanup", "cat": "family", "title": "Helping clean up", "setting": "Dinner's over. Time to earn major points.", "level": "Casual", "grad": "linear-gradient(135deg,#2a9d8f,#1c7d72)", "icon": "🧽", "steps": [{"who": "You", "es": "", "en": "", "q": "Everyone's getting up. What do you offer?", "choices": [{"es": "¿Te ayudo a lavar los platos?", "en": "Can I help wash the dishes?", "ok": true, "fb": "Offering to clean up wins hearts."}, {"es": "Estoy muy llena.", "en": "I'm so full.", "ok": false, "fb": "True, but offer to help first!"}]}, {"who": "Marta", "es": "No, mi'ja, tú eres la invitada.", "en": "No, sweetie, you're the guest.", "q": "She'll wave you off. Insist gently.", "choices": [{"es": "Insisto, con gusto ayudo.", "en": "I insist, I'm glad to help.", "ok": true, "fb": "Insisting (politely) is exactly right."}, {"es": "Bueno, está bien.", "en": "Okay, fine.", "ok": false, "fb": "Insist a little — she wants to see you try."}]}, {"who": "Marta", "es": "¡Qué amable eres!", "en": "How kind you are!", "q": "Close it humbly.", "choices": [{"es": "Es lo menos que puedo hacer.", "en": "It's the least I can do.", "ok": true, "fb": "Humble and warm — perfect."}, {"es": "De nada.", "en": "You're welcome.", "ok": false, "fb": "A touch off — 'es lo menos que puedo hacer' lands better."}]}], "win": "Insisting on helping clean up? That's how you go from guest to family. 🧽"}, {"id": "birthday", "cat": "family", "title": "At a family birthday", "setting": "It's a relative's birthday — cake, music, the whole family.", "level": "Casual", "grad": "linear-gradient(135deg,#d1495b,#a12f43)", "icon": "🎂", "steps": [{"who": "Relative", "es": "¡Qué bueno que viniste!", "en": "So glad you came!", "q": "Greet warmly and wish them.", "choices": [{"es": "¡No me lo perdería! Feliz cumpleaños.", "en": "I wouldn't miss it! Happy birthday.", "ok": true, "fb": "Warm and celebratory — perfect."}, {"es": "Hola.", "en": "Hi.", "ok": false, "fb": "It's a birthday — bring the energy!"}]}, {"who": "Everyone", "es": "¡Cumpleaños feliz, te deseamos a ti...!", "en": "Happy birthday to you...!", "q": "Everyone's singing. Join in!", "choices": [{"es": "¡Cumpleaños feliz! (canta con todos)", "en": "Happy birthday! (sing along)", "ok": true, "fb": "Singing along = belonging. Don't be shy!"}, {"es": "(quedarte callada)", "en": "(stay quiet)", "ok": false, "fb": "Jump in — nobody's judging your singing!"}]}, {"who": "Relative", "es": "¿Quieres un pedazo de cake?", "en": "Want a piece of cake?", "q": "Accept happily.", "choices": [{"es": "¡Claro, gracias! Se ve delicioso.", "en": "Of course, thanks! It looks delicious.", "ok": true, "fb": "Accepting the cake is part of the fun."}, {"es": "No, gracias.", "en": "No, thanks.", "ok": false, "fb": "Declining birthday cake feels cold — take a slice!"}]}], "win": "Sing along, take the cake, hug everyone. That's a Cuban party. 🎂"}, {"id": "morning", "cat": "couple", "title": "A morning together", "setting": "A weekday morning at home with your boyfriend before work.", "level": "Casual", "grad": "linear-gradient(135deg,#f4a261,#e76f51)", "icon": "☀️", "steps": [{"who": "Your boyfriend", "es": "Buenos días, mi amor. ¿Dormiste bien?", "en": "Good morning, my love. Did you sleep well?", "q": "Answer and ask back.", "choices": [{"es": "Buenos días. Sí, ¿y tú?", "en": "Good morning. Yes, and you?", "ok": true, "fb": "Warm and easy, bounced back."}, {"es": "Tengo mucho sueño.", "en": "I'm so sleepy.", "ok": false, "fb": "Greet him back first — then complain!"}]}, {"who": "Your boyfriend", "es": "¿Hago café?", "en": "Should I make coffee?", "q": "Split the tasks.", "choices": [{"es": "Sí, porfa. Yo hago el desayuno.", "en": "Yes, please. I'll make breakfast.", "ok": true, "fb": "Great teamwork."}, {"es": "No importa.", "en": "It doesn't matter.", "ok": false, "fb": "He asked yes/no — answer and offer to help."}]}, {"who": "Your boyfriend", "es": "¿A qué hora sales hoy?", "en": "What time do you leave today?", "q": "Coordinate your day.", "choices": [{"es": "A las ocho. ¿Vamos juntos?", "en": "At eight. Shall we go together?", "ok": true, "fb": "Answered and made a plan."}, {"es": "No sé todavía.", "en": "I don't know yet.", "ok": false, "fb": "If you know, tell him."}]}], "win": "The little morning back-and-forth is where your Spanish will really live. ☀️"}, {"id": "work", "cat": "couple", "title": "Working together", "setting": "You two work together, so you coordinate in Spanish all day.", "level": "Casual", "grad": "linear-gradient(135deg,#2a9d8f,#1c7d72)", "icon": "💼", "steps": [{"who": "Your boyfriend", "es": "Oye, ¿me ayudas con esto un momento?", "en": "Hey, help me with this a sec?", "q": "He needs a hand.", "choices": [{"es": "Claro, ¿qué necesitas?", "en": "Sure, what do you need?", "ok": true, "fb": "Helpful and to the point."}, {"es": "Estoy ocupada.", "en": "I'm busy.", "ok": false, "fb": "Offer a moment or a time — you're a team."}]}, {"who": "Your boyfriend", "es": "¿Puedes mandarle el correo al cliente?", "en": "Can you send the email to the client?", "q": "A quick hand-off.", "choices": [{"es": "Ya lo mando. ¿Algo más?", "en": "I'll send it now. Anything else?", "ok": true, "fb": "'Ya lo mando' sounds fluent."}, {"es": "¿Cuál correo?", "en": "Which email?", "ok": false, "fb": "Okay if lost — but try to take the task."}]}, {"who": "Your boyfriend", "es": "Gracias, mi vida. ¿Almorzamos juntos?", "en": "Thanks, my love. Lunch together?", "q": "Say yes sweetly.", "choices": [{"es": "¡Obvio! ¿A la una?", "en": "Obviously! At one?", "ok": true, "fb": "'Obvio' is a fun, natural yes."}, {"es": "Estoy trabajando.", "en": "I'm working.", "ok": false, "fb": "You can work AND eat — say yes!"}]}], "win": "Coworkers by day, partners always — juggling both in Spanish is a flex. 💼"}, {"id": "spat", "cat": "couple", "title": "A little disagreement", "setting": "A small argument at home. The goal isn't to win — it's to stay kind.", "level": "Real", "grad": "linear-gradient(135deg,#d1495b,#a12f43)", "icon": "🕊️", "steps": [{"who": "Your boyfriend", "es": "Me molesté porque no me avisaste.", "en": "I got upset because you didn't tell me.", "q": "Defuse it, don't dismiss it.", "choices": [{"es": "Tienes razón, perdóname. La próxima te aviso.", "en": "You're right, sorry. Next time I'll tell you.", "ok": true, "fb": "You owned it warmly. 'Tienes razón' goes far."}, {"es": "No es para tanto.", "en": "It's not a big deal.", "ok": false, "fb": "Dismissing his feelings pours fuel on it."}]}, {"who": "Your boyfriend", "es": "Es que me preocupé, nada más.", "en": "It's just that I worried, that's all.", "q": "Keep it calm.", "choices": [{"es": "Lo entiendo. Hablemos con calma, ¿sí?", "en": "I understand. Let's talk calmly, okay?", "ok": true, "fb": "'Hablemos con calma' invites peace."}, {"es": "Siempre te preocupas.", "en": "You always worry.", "ok": false, "fb": "'Always' turns it into a bigger fight."}]}, {"who": "Your boyfriend", "es": "¿Estamos bien?", "en": "Are we okay?", "q": "Close the loop with love.", "choices": [{"es": "Claro que sí. Te amo.", "en": "Of course we are. I love you.", "ok": true, "fb": "Reassurance plus 'te amo'. Fight over."}, {"es": "Supongo.", "en": "I guess.", "ok": false, "fb": "If you're okay, say so warmly."}]}], "win": "Handling a disagreement gently in his language is next-level. 🕊️"}, {"id": "cooking", "cat": "couple", "title": "Cooking dinner together", "setting": "Making dinner together at home — cozy kitchen Spanish.", "level": "Casual", "grad": "linear-gradient(135deg,#ff7043,#f4511e)", "icon": "🍳", "steps": [{"who": "Your boyfriend", "es": "¿Qué cocinamos hoy?", "en": "What are we cooking today?", "q": "Suggest something.", "choices": [{"es": "¿Hacemos arroz con pollo?", "en": "Shall we make arroz con pollo?", "ok": true, "fb": "A suggestion in the 'we' form. Natural."}, {"es": "Lo que sea.", "en": "Whatever.", "ok": false, "fb": "Offer an idea — it's more fun!"}]}, {"who": "Your boyfriend", "es": "Dale. ¿Cortas la cebolla?", "en": "Alright. Will you cut the onion?", "q": "Take a task, ask what you need.", "choices": [{"es": "Claro. ¿Dónde está el cuchillo?", "en": "Sure. Where's the knife?", "ok": true, "fb": "Accepted and asked a kitchen question."}, {"es": "No sé cortar.", "en": "I don't know how to cut.", "ok": false, "fb": "Give it a try — or ask 'enséñame'."}]}, {"who": "Your boyfriend", "es": "Quedó riquísimo, ¿no?", "en": "It came out delicious, right?", "q": "Celebrate together.", "choices": [{"es": "¡Buenísimo! Somos buen equipo.", "en": "So good! We're a good team.", "ok": true, "fb": "'Somos buen equipo' is sweet."}, {"es": "Está bien.", "en": "It's okay.", "ok": false, "fb": "Gush a little — 'buenísimo'!"}]}], "win": "Kitchen Spanish sticks because you use it daily. Next time, lead the recipe. 🍳"}, {"id": "weekend", "cat": "couple", "title": "Planning the weekend", "setting": "Figuring out weekend plans together on the couch.", "level": "Casual", "grad": "linear-gradient(135deg,#7b6cd9,#5a4bc0)", "icon": "🗓️", "steps": [{"who": "Your boyfriend", "es": "¿Qué quieres hacer este fin de semana?", "en": "What do you want to do this weekend?", "q": "Throw out an idea.", "choices": [{"es": "No sé, ¿vamos a la playa?", "en": "I don't know, shall we go to the beach?", "ok": true, "fb": "A relaxed suggestion in the 'we' form."}, {"es": "Nada.", "en": "Nothing.", "ok": false, "fb": "Give him something to work with!"}]}, {"who": "Your boyfriend", "es": "Me gusta la idea. ¿Invitamos a mis amigos?", "en": "I like it. Should we invite my friends?", "q": "He wants the crew.", "choices": [{"es": "¡Sí! Mientras más, mejor.", "en": "Yes! The more the merrier.", "ok": true, "fb": "'Mientras más, mejor' is perfect."}, {"es": "Prefiero que no.", "en": "I'd rather not.", "ok": false, "fb": "Valid IRL — but yes keeps the practice going!"}]}, {"who": "Your boyfriend", "es": "Perfecto. Yo manejo.", "en": "Perfect. I'll drive.", "q": "Offer to bring something.", "choices": [{"es": "Y yo llevo la música.", "en": "And I'll bring the music.", "ok": true, "fb": "Playful, and you're adding to the plan."}, {"es": "Bueno.", "en": "Okay.", "ok": false, "fb": "Add a little something!"}]}], "win": "Planning life together in Spanish, one weekend at a time. 🗓️"}, {"id": "datenight", "cat": "couple", "title": "A date night", "setting": "A night out, just the two of you.", "level": "Casual", "grad": "linear-gradient(135deg,#d1495b,#a12f43)", "icon": "🌹", "steps": [{"who": "Your boyfriend", "es": "Te ves hermosa esta noche.", "en": "You look beautiful tonight.", "q": "Take the compliment lly."}, {"es": "No me acuerdo.", "en": "I don't remember.", "ok": false, "fb": "Name a couple things to practice!"}]}, {"who": "Your boyfriend", "es": "Listo, ¿algo más?", "en": "Done, anything else?", "q": "Wrap it up.", "choices": [{"es": "Ya está todo. Vamos a casa.", "en": "That's everything. Let's go home.", "ok": true, "fb": "Clean and natural."}, {"es": "Supongo.", "en": "I guess.", "ok": false, "fb": "Be decisive — 'ya está todo'!"}]}], "win": "Errand Spanish is everyday Spanish — leche, pan, café. 🛒"}, {"id": "roughday", "cat": "couple", "title": "When he's had a rough day", "setting": "He comes home stressed from work. Comfort him in Spanish.", "level": "Warm", "grad": "linear-gradient(135deg,#7b6cd9,#5a4bc0)", "icon": "🫂", "steps": [{"who": "Your boyfriend", "es": "Uf, qué día tan largo.", "en": "Ugh, what a long day.", "q": "Open the door for him to vent.", "choices": [{"es": "¿Qué pasó, mi amor? Cuéntame.", "en": "What happened, my love? Tell me.", "ok": true, "fb": "Inviting and caring — perfect."}, {"es": "Ok.", "en": "Ok.", "ok": false, "fb": "He needs you to lean in a little."}]}, {"who": "Your boyfriend", "es": "Todo salió mal en el trabajo.", "en": "Everything went wrong at work.", "q": "Comfort, don't minimize.", "choices": [{"es": "Lo siento mucho. Estoy aquí para ti.", "en": "I'm so sorry. I'm here for you.", "ok": true, "fb": "Exactly what he needs to hear."}, {"es": "No es para tanto.", "en": "It's not that big a deal.", "ok": false, "fb": "That brushes off his feelings."}]}, {"who": "Your boyfriend", "es": "Gracias por escucharme.", "en": "Thanks for listening.", "q": "Reassure him.", "choices": [{"es": "Siempre. Te amo.", "en": "Always. I love you.", "ok": true, "fb": "Simple and loving. You're his soft place."}, {"es": "De nada.", "en": "You're welcome.", "ok": false, "fb": "Warmer is better here — 'siempre, te amo'."}]}], "win": "Being his soft place to land in Spanish? That's real intimacy. 🫂"}, {"id": "decision", "cat": "couple", "title": "Meeting in the middle", "setting": "You two want different things tonight and need to compromise.", "level": "Real", "grad": "linear-gradient(135deg,#f4a261,#e76f51)", "icon": "🤝", "steps": [{"who": "Your boyfriend", "es": "Yo quiero quedarme en casa.", "en": "I want to stay home.", "q": "You wanted to go out. Find a middle ground.", "choices": [{"es": "Yo quería salir... ¿buscamos algo intermedio?", "en": "I wanted to go out... find a middle ground?", "ok": true, "fb": "Honest and collaborative — great."}, {"es": "Bueno, como quieras.", "en": "Fine, whatever you want.", "ok": false, "fb": "Don't just give up — offer a compromise."}]}, {"who": "Your boyfriend", "es": "¿Qué propones?", "en": "What do you suggest?", "q": "Offer a real option.", "choices": [{"es": "¿Pedimos comida y vemos una película?", "en": "Order food and watch a movie?", "ok": true, "fb": "A concrete compromise. Nicely done."}, {"es": "No sé, tú decides.", "en": "I don't know, you decide.", "ok": false, "fb": "Bring an idea to the table!"}]}, {"who": "Your boyfriend", "es": "Me parece perfecto.", "en": "Sounds perfect to me.", "q": "Close with warmth.", "choices": [{"es": "¿Ves? Somos buen equipo.", "en": "See? We're a good team.", "ok": true, "fb": "Sweet way to seal a compromise."}, {"es": "Ok.", "en": "Ok.", "ok": false, "fb": "Add a little warmth!"}]}], "win": "Compromising in Spanish, kindly, is a real relationship skill. 🤝"}, {"id": "lazysunday", "cat": "couple", "title": "A lazy Sunday", "setting": "A slow morning together, nowhere to be.", "level": "Casual", "grad": "linear-gradient(135deg,#e9b949,#c48a12)", "icon": "🛋️", "steps": [{"who": "Your boyfriend", "es": "No quiero hacer nada hoy.", "en": "I don't want to do anything today.", "q": "Match his mood.", "choices": [{"es": "Yo tampoco. Quedémonos en la cama.", "en": "Me neither. Let's stay in bed.", "ok": true, "fb": "'Yo tampoco' (me neither) is a great little phrase."}, {"es": "Tenemos que levantarnos.", "en": "We have to get up. fb": "But you did that time! Reflect it back."}]}, {"who": "Your boyfriend", "es": "Es que 'guagua' aquí quiere decir autobús.", "en": "It's that 'guagua' here means bus.", "q": "He clarifies a Cuban word.", "choices": [{"es": "¡Ah, mira! No sabía esa. ¿Cómo se escribe?", "en": "Oh, look! Didn't know that one. How's it spelled?", "ok": true, "fb": "Curiosity turns everyone into your teacher."}, {"es": "Da igual.", "en": "Whatever.", "ok": false, "fb": "It matters — that's how you learn their Spanish."}]}], "win": "The trick isn't catching every word — it's staying in the conversation. 🗝️"}, {"id": "restaurant", "cat": "world", "title": "At a restaurant", "setting": "Ordering at a restaurant on your own.", "level": "Practical", "grad": "linear-gradient(135deg,#3aa0d8,#1f6fa8)", "icon": "🍽️", "steps": [{"who": "Waiter", "es": "Buenas, ¿qué le traigo?", "en": "Hi, what can I get you?", "q": "Ask for a suggestion.", "choices": [{"es": "Hola, ¿me recomienda algo?", "en": "Hi, do you recommend something?", "ok": true, "fb": "A great way to order when unsure."}, {"es": "No sé.", "en": "I don't know.", "ok": false, "fb": "Ask him to recommend something!"}]}, {"who": "Waiter", "es": "El pollo está muy bueno hoy.", "en": "The chicken is very good today.", "q": "Order it.", "choices": [{"es": "Perfecto, quiero el pollo, por favor.", "en": "Perfect, I'll have the chicken, please.", "ok": true, "fb": "Clear and polite."}, {"es": "Eh...", "en": "Uh...", "ok": false, "fb": "Go for it — 'quiero el pollo, por favor'."}]}, {"who": "Waiter", "es": "¿Algo de tomar?", "en": "Anything to drink?", "q": "Add a drink.", "choices": [{"es": "Un jugo, por favor. Gracias.", "en": "A juice, please. Thank you.", "ok": true, "fb": "You ordered a full meal solo!"}, {"es": "No.", "en": "No.", "ok": false, "fb": "A simple 'un agua, por favor' is friendlier."}]}], "win": "You ordered a whole meal in Spanish by yourself. That's huge. 🍽️"}, {"id": "cafe", "cat": "world", "title": "Ordering coffee", "setting": "Grabbing a coffee at a café counter.", "level": "Practical", "grad": "linear-gradient(135deg,#ff7043,#f4511e)", "icon": "☕", "steps": [{"who": "Barista", "es": "¿Qué va a querer?", "en": "What would you like?", "q": "Order politely.", "choices": [{"es": "Un café con leche, por favor.", "en": "A coffee with milk, please.", "ok": true, "fb": "Simple and polite. Perfect."}, {"es": "Dame café.", "en": "Gimme coffee.", "ok": false, "fb": "Add 'por favor' — 'un café, por favor'."}]}, {"who": "Barista", "es": "¿Algo más?", "en": "Anything else?", "q": "Wrap up and ask the price.", "choices": [{"es": "No, así está bien. ¿Cuánto es?", "en": "No, that's all. How much is it?", "ok": true, "fb": "'¿Cuánto es?' is your go-to."}, {"es": "No sé.", "en": "I don't know.", "ok": false, "fb": "Just 'no, gracias. ¿Cuánto es?'"}]}, {"who": "Barista", "es": "Son tres dólares.", "en": "That's three dollars.", "q": "Pay and thank them.", "choices": [{"es": "Aquí tiene. Gracias.", "en": "Here you go. Thanks.", "ok": true, "fb": "Smooth. Café conquered."}, {"es": "Ok.", "en": "Ok.", "ok": false, "fb": "'Aquí tiene, gracias' is warmer."}]}], "win": "Café Spanish is quick to learn and you'll use it constantly. ☕"}, {"id": "market", "cat": "world", "title": "At the grocery store", "setting": "Picking up a few things and asking where they are.", "level": "Practical", "grad": "linear-gradient(135deg,#2a9d8f,#1c7d72)", "icon": "🛒", "steps": [{"who": "You", "es": "", "en": "", "q": "Ask an employee where the bread is.", "choices": [{"es": "Disculpe, ¿dónde está el pan?", "en": "Excuse me, where's the bread?", "ok": true, "fb": "'Disculpe, ¿dónde está...?' — endlessly useful."}, {"es": "¿Pan?", "en": "Bread?", "ok": false, "fb": "Add the polite frame: 'disculpe, ¿dónde está el pan?'"}]}, {"who": "Clerk", "es": "Al fondo, a la derecha.", "en": "In the back, on the right.", "q": "Thank them and ask for one more thing.", "choices": [{"es": "Gracias. ¿Y los huevos?", "en": "Thanks. And the eggs?
