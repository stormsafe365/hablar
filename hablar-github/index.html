const BREAKDOWN = [{"es": "¿Qué bolá, asere?", "lit": "What wave, buddy?", "w": [["qué", "what"], ["bolá", "(slang) wave / vibe"], ["asere", "buddy, dude"]], "how": "A fixed Cuban greeting. 'Bolá' is street slang (a twist on 'bola'), so don't translate it literally — the whole thing just means 'what's up?'"}, {"es": "¡Tremendo!", "lit": "Tremendous!", "w": [["tremendo", "tremendous, huge"]], "how": "Used on its own as an exclamation for anything great, big, or impressive — food, news, a party, a person."}, {"es": "Resolver", "lit": "To resolve", "w": [["resolver", "to resolve / solve"]], "how": "In Cuba this everyday verb carries a whole mindset: to find a way to get something done despite obstacles or scarcity."}, {"es": "Mi socio / mi socia", "lit": "My partner", "w": [["mi", "my"], ["socio / socia", "business partner (m/f)"]], "how": "A formal word for 'business partner' used affectionately for a close friend — like calling someone 'my guy'."}, {"es": "¡Qué volá!", "lit": "What flew!", "w": [["qué", "what"], ["volá", "(slang, from 'voló' = flew) what's going on"]], "how": "A cousin of '¿qué bolá?' — used for surprise ('no way!') or as a casual 'what's up?'"}, {"es": "Pinchar", "lit": "To prick", "w": [["pinchar", "to prick / puncture → (Cuba) to work"]], "how": "Standard Spanish 'pinchar' means to prick; in Cuba it's slang for going to work: 'tengo que pinchar' = I have to work."}, {"es": "¡Qué guapo/a!", "lit": "How brave!", "w": [["qué", "how"], ["guapo / guapa", "(Cuba) brave, tough (m/f)"]], "how": "Careful — everywhere else 'guapo' means good-looking, but in Cuba it means brave or gutsy. Context tells you which."}, {"es": "Tener coco", "lit": "To have coconut", "w": [["tener", "to have"], ["coco", "coconut → head, brains"]], "how": "'Coco' (coconut) is slang for your head, so 'to have coconut' means to be smart."}, {"es": "La máquina", "lit": "The machine", "w": [["la", "the"], ["máquina", "machine"]], "how": "Cubans call their classic vintage American cars 'máquinas' — the machine."}, {"es": "La yuma", "lit": "The yuma", "w": [["la", "the"], ["yuma", "(slang) the USA / a foreigner"]], "how": "Cuban slang for the United States (or the West generally): 'se fue pa' la yuma' = he left for the States."}, {"es": "Estar arrancado/a", "lit": "To be torn off", "w": [["estar", "to be (a state)"], ["arrancado / arrancada", "torn off, pulled out (m/f)"]], "how": "Picture being 'torn off' from your money — it means flat broke."}, {"es": "Comerse un cable", "lit": "To eat a cable", "w": [["comerse", "to eat up"], ["un", "a"], ["cable", "cable, wire"]], "how": "An idiom: 'eating a cable' means going through a really rough patch — no money, hard times."}, {"es": "Dame un toque", "lit": "Give me a touch", "w": [["dame", "give me (da + me)"], ["un", "a"], ["toque", "touch, ring"]], "how": "'A touch' = a quick call or message: 'when you arrive, give me a buzz.'"}, {"es": "Estar a millón", "lit": "To be at a million", "w": [["estar", "to be"], ["a", "at"], ["millón", "million"]], "how": "Going 'at a million' (miles an hour) means being super excited or fired up."}, {"es": "¡Qué bárbaro!", "lit": "How barbarian!", "w": [["qué", "how"], ["bárbaro", "barbarian → amazing"]], "how": "'Barbarian' flips to a compliment here — awesome, incredible, unbelievable."}, {"es": "Echar un pie", "lit": "To toss a foot", "w": [["echar", "to throw, toss"], ["un", "a"], ["pie", "foot"]], "how": "'Tossing a foot' means to dance — a very Cuban way to say let's hit the floor."}, {"es": "Mi cielo", "lit": "My sky", "w": [["mi", "my"], ["cielo", "sky, heaven"]], "how": "'My sky/heaven' is a sweet term of endearment, often from older relatives."}, {"es": "Jamar", "lit": "To eat (slang)", "w": [["jamar", "(slang) to eat"]], "how": "Casual slang for eating: 'vamos a jamar algo' = let's grab a bite."}, {"es": "Estar en candela", "lit": "To be in flame", "w": [["estar", "to be"], ["en", "in"], ["candela", "flame, fire"]], "how": "'In the flame' = in trouble, or a situation that's heated up."}, {"es": "Está fula la cosa", "lit": "The thing is fula", "w": [["está", "is"], ["fula", "(slang) bad, sketchy"], ["la", "the"], ["cosa", "thing"]], "how": "'Fula' is slang for bad or dodgy, so 'the thing is fula' means things are rough or tense."}, {"es": "Mi'jo / mi'ja", "lit": "My son / my daughter", "w": [["mi'jo / mi'ja", "squeezed form of 'mi hijo / mi hija'"]], "how": "'Mi hijo/hija' (my son/daughter) contracts to 'mi'jo/mi'ja' and is used affectionately for anyone younger. If his mom calls you this, you're in."}, {"es": "Tener flow", "lit": "To have flow", "w": [["tener", "to have"], ["flow", "(English loan) swagger, style"]], "how": "Modern slang that borrows the English word 'flow' — to have effortless cool."}, {"es": "¡Tú estás loco/a!", "lit": "You are crazy!", "w": [["tú", "you"], ["estás", "are (estar)"], ["loco / loca", "crazy (m/f)"]], "how": "Said playfully among friends — 'you're nuts!' — not an insult."}, {"es": "Coger lucha", "lit": "To grab struggle", "w": [["coger", "to take, grab"], ["lucha", "struggle, fight"]], "how": "'Grabbing struggle' means to hustle and grind hard to get ahead — high praise in Cuba."}, {"es": "Estar en el yeyo", "lit": "To be in the faint", "w": [["estar", "to be"], ["en", "in"], ["el", "the"], ["yeyo", "(slang) fainting spell, shock"]], "how": "A 'yeyo' is a dizzy/fainting spell, so being 'en el yeyo' means stunned or frozen in disbelief."}, {"es": "Echar fresco", "lit": "To throw cool air", "w": [["echar", "to throw"], ["fresco", "cool / fresh air"]], "how": "'Throwing fresh air' means to relax and cool off — let's chill."}, {"es": "¡Dale!", "lit": "Give it!", "w": [["dale", "give it (dar 'to give' + le)"]], "how": "Literally 'give it to him,' but it's the all-purpose Cuban 'go for it / alright / let's go.'"}, {"es": "Estar en la fanguita", "lit": "To be in the little mud", "w": [["estar", "to be"], ["en", "in"], ["la", "the"], ["fanguita", "little mud ('fango' = mud + -ita)"]], "how": "Stuck 'in the little mud' means caught in a mess or a jam."}, {"es": "¡Qué rico está esto!", "lit": "How tasty this is!", "w": [["qué", "how"], ["rico", "tasty, delicious"], ["está", "is"], ["esto", "this"]], "how": "'Rico' means delicious (not rich, here). A classic thing to say about the food."}, {"es": "No cojas lucha", "lit": "Don't take on struggle", "w": [["no", "don't"], ["cojas", "take (coger, command form)"], ["lucha", "struggle"]], "how": "The flip side of 'coger lucha' — 'don't take on struggle' means don't stress about it."}, {"es": "¡Bacano!", "lit": "Cool!", "w": [["bacano", "(slang) cool, awesome"]], "how": "A Colombian way to say something's great."}, {"es": "¿Quiubo, parce?", "lit": "What was there, buddy?", "w": [["quiubo", "squeezed 'qué hubo' = what was there → what's up"], ["parce", "buddy (from 'parcero')"]], "how": "'Qué hubo' collapses into 'quiubo,' and 'parce' is your pal — 'what's up, dude?'"}, {"es": "A la orden", "lit": "At the order", "w": [["a", "at"], ["la", "the"], ["orden", "order, command"]], "how": "'At your command' — used constantly as 'at your service' and also as 'you're welcome.'"}, {"es": "¡Qué chévere!", "lit": "How cool!", "w": [["qué", "how"], ["chévere", "cool, great"]], "how": "'Chévere' is as flexible as 'cool' in English."}, {"es": "Listo", "lit": "Ready", "w": [["listo", "ready"]], "how": "Literally 'ready,' but used to mean 'OK / got it / done.'"}, {"es": "Dar papaya", "lit": "To give papaya", "w": [["dar", "to give"], ["papaya", "papaya (the fruit)"]], "how": "An idiom: 'giving papaya' is leaving yourself open to trouble or theft. 'No des papaya' = don't make yourself a target."}, {"es": "Estoy mamado/a", "lit": "I'm worn out", "w": [["estoy", "I am"], ["mamado / mamada", "(slang) worn out, exhausted (m/f)"]], "how": "Very common slang for wiped out after a long day."}, {"es": "Mamar gallo", "lit": "To suck rooster", "w": [["mamar", "to suck"], ["gallo", "rooster"]], "how": "Don't take it literally — this idiom means to joke around, tease, or stall: 'deja de mamar gallo' = quit messing around."}, {"es": "Un tinto", "lit": "A tinted one", "w": [["un", "a"], ["tinto", "tinted / dark-red → (Colombia) black coffee"]], "how": "Elsewhere 'tinto' is red wine; in Colombia a 'tinto' is a small black coffee. '¿Quieres un tinto?'"}, {"es": "Berraco/a", "lit": "Wild boar", "w": [["berraco / berraca", "boar → tough, gutsy, great (m/f)"]], "how": "From 'verraco' (a boar). Calling someone 'berraco' praises their strength or skill."}, {"es": "¡Tenaz!", "lit": "Tenacious!", "w": [["tenaz", "tenacious, tough"]], "how": "Used for something intense, rough, or hard to believe: '¡tenaz ese examen!' = that test was brutal."}, {"es": "Hacer una vaca", "lit": "To make a cow", "w": [["hacer", "to make"], ["una", "a"], ["vaca", "cow"]], "how": "'Making a cow' means everyone pools their money together for something."}, {"es": "Estar en la olla", "lit": "To be in the pot", "w": [["estar", "to be"], ["en", "in"], ["la", "the"], ["olla", "pot"]], "how": "Being 'in the pot' means broke or in a tight spot."}, {"es": "Estar en mi salsa", "lit": "To be in my sauce", "w": [["estar", "to be"], ["en", "in"], ["mi", "my"], ["salsa", "sauce"]], "how": "'In my sauce' means in my element — doing what I love and thriving."}, {"es": "¡Qué mala pata!", "lit": "What a bad paw!", "w": [["qué", "what"], ["mala", "bad"], ["pata", "paw, animal leg"]], "how": "A 'bad paw' is bad luck — 'what rotten luck!'"}, {"es": "Mi amor / mi vida", "lit": "My love / my life", "w": [["mi", "my"], ["amor", "love"], ["vida", "life"]], "how": "Warm endearments used widely — for a partner, but also family and friends. Not always romantic."}, {"es": "Echar los perros", "lit": "To throw the dogs", "w": [["echar", "to throw"], ["los", "the"], ["perros", "dogs"]], "how": "'Throwing the dogs' at someone means flirting hard or hitting on them."}, {"es": "¡Qué nota!", "lit": "What a note!", "w": [["qué", "what"], ["nota", "note"]], "how": "'What a note!' means how cool. A great person can be called 'una nota.'"}, {"es": "¡Uy, juemadre!", "lit": "Whoa, geez!", "w": [["uy", "whoa, oops"], ["juemadre", "softened 'hijuemadre' = geez"]], "how": "A mild paisa (Medellín-region) exclamation of surprise."}, {"es": "¡Qué belleza!", "lit": "What beauty!", "w": [["qué", "what"], ["belleza", "beauty"]], "how": "'What beauty!' = how lovely — for a thing, a place, or a kind gesture."}, {"es": "Hágale pues", "lit": "Do it then", "w": [["hágale", "do it (hacer, command + le)"], ["pues", "then, well"]], "how": "A very paisa way to say 'sure, go ahead / let's do it.'"}, {"es": "Con mucho gusto", "lit": "With much pleasure", "w": [["con", "with"], ["mucho", "much"], ["gusto", "pleasure"]], "how": "'With much pleasure' — an extra-polite Colombian 'you're welcome' or 'gladly.'"}, {"es": "Buenos días", "lit": "Good days", "w": [["buenos", "good (masc. plural)"], ["días", "days"]], "how": "Literally 'good days' (plural) — it just means good morning."}, {"es": "Buenas tardes", "lit": "Good afternoons", "w": [["buenas", "good (fem. plural)"], ["tardes", "afternoons"]], "how": "'Good afternoons' — used from noon until sunset."}, {"es": "Buenas noches", "lit": "Good nights", "w": [["buenas", "good (fem. plural)"], ["noches", "nights"]], "how": "'Good nights' — both 'good evening' and 'goodnight.'"}, {"es": "¿Cómo está usted?", "lit": "How is you (formal)?", "w": [["cómo", "how"], ["está", "is / are"], ["usted", "you (formal)"]], "how": "'Usted' is the polite 'you,' and it takes the 'he/she' verb form ('está'). The casual version is '¿cómo estás?'"}, {"es": "Mucho gusto", "lit": "Much pleasure", "w": [["mucho", "much"], ["gusto", "pleasure"]], "how": "Short for 'mucho gusto en conocerte' — a pleasure to meet you."}, {"es": "Con permiso", "lit": "With permission", "w": [["con", "with"], ["permiso", "permission"]], "how": "'With permission' — say it to squeeze past someone or leave the table politely."}, {"es": "Disculpe", "lit": "Excuse (formal)", "w": [["disculpe", "excuse / forgive me (disculpar, formal command)"]], "how": "A polite 'excuse me' to get attention or apologize."}, {"es": "¿Me puede repetir más despacio?", "lit": "Can you repeat to me more slowly?", "w": [["me", "to me"], ["puede", "can (you, formal)"], ["repetir", "to repeat"], ["más", "more"], ["despacio", "slowly"]], "how": "'Me' is the indirect object — 'repeat it to me.' Your most useful phrase; nobody minds slowing down."}, {"es": "¿Cómo se dice... en español?", "lit": "How does one say... in Spanish?", "w": [["cómo", "how"], ["se", "one / (impersonal)"], ["dice", "says (decir)"], ["en", "in"], ["español", "Spanish"]], "how": "'Se dice' is impersonal — 'how is it said?' A great way to get people teaching you."}, {"es": "Estoy aprendiendo español", "lit": "I am learning Spanish", "w": [["estoy", "I am (estar)"], ["aprendiendo", "learning"], ["español", "Spanish"]], "how": "'estar' + a verb ending in -ando/-iendo = the present continuous, 'I am ___ing.'"}, {"es": "Estoy de acuerdo", "lit": "I am of agreement", "w": [["estoy", "I am"], ["de", "of"], ["acuerdo", "agreement"]], "how": "'I'm of agreement' is simply 'I agree.'"}, {"es": "No hay problema", "lit": "There isn't problem", "w": [["no", "no, not"], ["hay", "there is / are"], ["problema", "problem"]], "how": "'Hay' means 'there is/are,' so this is 'there's no problem.' (Note: 'problema' is masculine despite the -a.)"}, {"es": "Lo siento mucho", "lit": "I feel it much", "w": [["lo", "it"], ["siento", "I feel (sentir)"], ["mucho", "much"]], "how": "'I feel it a lot' = I'm very sorry. Works for apologies and condolences."}, {"es": "Ojalá", "lit": "Hopefully", "w": [["ojalá", "hopefully, I hope so"]], "how": "It comes from Arabic 'law šā’ Allāh' (God willing) and now just means 'hopefully.' It's usually followed by the subjunctive."}, {"es": "Tengo que irme", "lit": "I have that to go myself", "w": [["tengo", "I have"], ["que", "to (that)"], ["irme", "to go / leave (ir + me)"]], "how": "'tener que + verb' means 'have to ___.' 'Irme' is the reflexive 'to take myself off / leave.'"}, {"es": "Nos vemos pronto", "lit": "We see each other soon", "w": [["nos", "each other"], ["vemos", "we see (ver)"], ["pronto", "soon"]], "how": "'Nos' here is reciprocal — 'we see each other.' A friendly 'see you soon.'"}, {"es": "¡Salud!", "lit": "Health!", "w": [["salud", "health"]], "how": "'Health!' — used both for toasting drinks (cheers) and after a sneeze (bless you)."}, {"es": "¡Felicidades!", "lit": "Happinesses!", "w": [["felicidades", "congratulations (plural of 'felicidad')"]], "how": "The plural of 'happiness' is used to say congratulations — for birthdays, weddings, achievements."}, {"es": "Muchísimas gracias", "lit": "Very many thanks", "w": [["muchísimas", "very many (mucho + -ísimo)"], ["gracias", "thanks"]], "how": "Adding '-ísimo/a' supercharges a word. 'Muchísimas gracias' = thank you SO much."}, {"es": "No estoy segura", "lit": "I am not sure (f.)", "w": [["no", "not"], ["estoy", "I am"], ["segura", "sure (feminine)"]], "how": "Adjectives agree with your gender: a woman says 'segura,' a man says 'seguro.'"}, {"es": "Está delicioso", "lit": "It is delicious", "w": [["está", "is (estar)"], ["delicioso", "delicious"]], "how": "'Estar' is used for how something tastes right now — a current state."}, {"es": "Esto está riquísimo", "lit": "This is super-tasty", "w": [["esto", "this"], ["está", "is"], ["riquísimo", "super delicious (rico + -ísimo)"]], "how": "'Rico' (tasty) + '-ísimo' = extremely tasty. Stronger than plain 'rico' and a big compliment to the cook."}, {"es": "¿Puedo ayudar con algo?", "lit": "Can I help with something?", "w": [["puedo", "can I (poder)"], ["ayudar", "to help"], ["con", "with"], ["algo", "something"]], "how": "'poder' + a second verb = 'can I ___.' Offering to help scores big points."}, {"es": "¿Me das la receta?", "lit": "Do you give me the recipe?", "w": [["me", "to me"], ["das", "you give (dar)"], ["la", "the"], ["receta", "recipe"]], "how": "'Me' is 'to me' (indirect object). Asking for the recipe is the ultimate compliment to the cook."}, {"es": "¿Me puede pasar la sal?", "lit": "Can you pass me the salt?", "w": [["me", "to me"], ["puede", "can you (formal)"], ["pasar", "to pass"], ["la", "the"], ["sal", "salt"]], "how": "A polite table request; 'me' = to me."}, {"es": "Estoy llena, gracias", "lit": "I am full, thanks (f.)", "w": [["estoy", "I am"], ["llena", "full (feminine)"], ["gracias", "thanks"]], "how": "'Estar' for a temporary state. A woman says 'llena,' a man says 'lleno.' A polite way to pass on seconds."}, {"es": "¿Qué lleva este plato?", "lit": "What does this dish carry?", "w": [["qué", "what"], ["lleva", "carries → (with food) contains"], ["este", "this"], ["plato", "dish, plate"]], "how": "'Llevar' normally means 'to carry,' but with food it idiomatically means 'to contain / have in it.' So word-for-word it's 'what does this dish carry?' — meaning 'what's in this dish?'"}, {"es": "¿Es picante?", "lit": "Is it spicy?", "w": [["es", "is (ser)"], ["picante", "spicy"]], "how": "Here 'ser' is used because spiciness is treated as an inherent quality of the dish."}, {"es": "Gracias por invitarme", "lit": "Thanks for to-invite-me", "w": [["gracias", "thanks"], ["por", "for"], ["invitarme", "to invite me (invitar + me)"]], "how": "'por + a verb' means 'for ___ing,' and '-me' tacks 'me' onto the end: 'thanks for inviting me.'"}, {"es": "¿Quieres algo de tomar?", "lit": "Do you want something of to-drink?", "w": [["quieres", "you want (querer)"], ["algo", "something"], ["de", "of / to"], ["tomar", "to drink (or take)"]], "how": "'algo de tomar' = 'something to drink.' 'Tomar' means to drink here (it can also mean to take)."}, {"es": "El arroz con pollo", "lit": "The rice with chicken", "w": [["el", "the"], ["arroz", "rice"], ["con", "with"], ["pollo", "chicken"]], "how": "Straightforward and a beloved dish — praise it and they'll beam."}, {"es": "El lechón", "lit": "The suckling pig", "w": [["el", "the"], ["lechón", "roast/suckling pork"]], "how": "A specific food word — the Cuban celebration centerpiece."}, {"es": "Los frijoles negros", "lit": "The beans black", "w": [["los", "the"], ["frijoles", "beans"], ["negros", "black"]], "how": "In Spanish the adjective usually comes after the noun and must agree — plural and masculine here, so 'negros.'"}, {"es": "Los tostones / plátanos", "lit": "The tostones / plantains", "w": [["tostones", "twice-fried green plantains"], ["plátanos", "plantains"]], "how": "Vocabulary: 'tostones' are the savory smashed-and-fried kind; 'maduros' would be the sweet ripe kind."}, {"es": "Un cafecito", "lit": "A little coffee", "w": [["un", "a"], ["cafecito", "little coffee (café + -cito)"]], "how": "'-ito' makes things little or affectionate. 'Un cafecito' is a sweet little espresso — softens the offer, so say yes."}, {"es": "¡Qué familia tan linda!", "lit": "What a family so lovely!", "w": [["qué", "what"], ["familia", "family"], ["tan", "so"], ["linda", "lovely"]], "how": "'¡Qué ___ tan ___!' is a set frame for exclamations — 'what a so-lovely family!'"}, {"es": "Me siento como en familia", "lit": "I feel myself like in family", "w": [["me", "myself"], ["siento", "I feel (sentirse)"], ["como", "like"], ["en", "in"], ["familia", "family"]], "how": "'Sentirse' is reflexive — 'me siento' = I feel. 'Como en familia' = like among family. This line melts hearts."}, {"es": "La abuela", "lit": "The grandmother", "w": [["la", "the"], ["abuela", "grandmother"]], "how": "Vocabulary — and often the head of the household, so greet her first."}, {"es": "Cocinas delicioso", "lit": "You cook delicious", "w": [["cocinas", "you cook (tú form of cocinar)"], ["delicioso", "delicious(ly)"]], "how": "'Cocinas' is the informal 'you' form. The adjective is used adverbially here — 'you cook deliciously.'"}, {"es": "Me encantaría llevar un poquito", "lit": "It would delight me to take a little bit", "w": [["me", "to me"], ["encantaría", "would delight (conditional of encantar)"], ["llevar", "to take / carry"], ["un", "a"], ["poquito", "little bit (poco + -ito)"]], "how": "'Encantar' works backwards like 'gustar': 'me encantaría' = I'd love. 'Poquito' is a tiny, softened 'little bit.'"}, {"es": "Te amo", "lit": "I love you", "w": [["te", "you (object)"], ["amo", "I love (amar)"]], "how": "'Amar' is deep, romantic love. The object 'te' comes before the verb. Save this one for him."}, {"es": "Te quiero mucho", "lit": "I want you much", "w": [["te", "you"], ["quiero", "I love / want (querer)"], ["mucho", "much"]], "how": "'Querer' literally means 'to want,' but with people it means love — warmer and softer than 'amar,' good for family and partner alike."}, {"es": "Te extraño", "lit": "I miss you", "w": [["te", "you"], ["extraño", "I miss (extrañar)"]], "how": "'Extrañar' = to miss someone."}, {"es": "Dame un beso", "lit": "Give me a kiss", "w": [["dame", "give me (da + me)"], ["un", "a"], ["beso", "kiss"]], "how": "A command ('da') with 'me' attached — 'give me.'"}, {"es": "Eres mi persona favorita", "lit": "You are my favorite person", "w": [["eres", "you are (ser)"], ["mi", "my"], ["persona", "person"], ["favorita", "favorite (f.)"]], "how": "'Ser' for identity. 'Persona' is always feminine, so the adjective is 'favorita.'"}, {"es": "¿Qué quieres hacer hoy?", "lit": "What do you want to do today?", "w": [["qué", "what"], ["quieres", "you want (querer)"], ["hacer", "to do / make"], ["hoy", "today"]], "how": "'querer' + a second verb = 'want to ___.'"}, {"es": "¿Vemos una película?", "lit": "Do we watch a movie?", "w": [["vemos", "we see / watch (ver)"], ["una", "a"], ["película", "movie"]], "how": "The plain present tense is often used to suggest something — 'shall we watch a movie?'"}, {"es": "Que duermas rico", "lit": "May you sleep nicely", "w": [["que", "(may / that)"], ["duermas", "you sleep (subjunctive of dormir)"], ["rico", "nicely, cozily"]], "how": "'Que' + the subjunctive expresses a wish ('may you...'). 'Dormir rico' is a warm Cuban way to say sleep well."}, {"es": "Buenos días, mi amor", "lit": "Good morning, my love", "w": [["buenos días", "good morning"], ["mi", "my"], ["amor", "love"]], "how": "Tack 'mi amor' onto any greeting to warm it up."}, {"es": "Perdóname, tienes razón", "lit": "Forgive me, you have reason", "w": [["perdóname", "forgive me (perdonar + me)"], ["tienes", "you have (tener)"], ["razón", "reason / rightness"]], "how": "'Tener razón' literally 'to have reason' means 'to be right.' A handy peacemaker line."}, {"es": "No es para tanto", "lit": "It's not for so much", "w": [["no", "not"], ["es", "is"], ["para", "for"], ["tanto", "so much"]], "how": "A set idiom meaning 'it's not that big a deal.'"}, {"es": "Hablemos de esto con calma", "lit": "Let's talk about this with calm", "w": [["hablemos", "let's talk (hablar, -emos)"], ["de", "about"], ["esto", "this"], ["con", "with"], ["calma", "calm"]], "how": "The '-emos' ending is the 'let's ___' form. 'Con calma' = calmly."}, {"es": "Me haces muy feliz", "lit": "You make me very happy", "w": [["me", "me"], ["haces", "you make (hacer)"], ["muy", "very"], ["feliz", "happy"]], "how": "'Hacer' = to make; 'me haces feliz' = you make me happy."}, {"es": "Estamos juntos en esto", "lit": "We are together in this", "w": [["estamos", "we are (estar)"], ["juntos", "together"], ["en", "in"], ["esto", "this"]], "how": "'Estar' for a state. 'Juntos' defaults to the masculine plural for a mixed pair."}, {"es": "¡Tú estás loco!", "lit": "You are crazy!", "w": [["tú", "you"], ["estás", "are (estar)"], ["loco", "crazy (m)"]], "how": "Playful teasing — 'you're nuts!' A woman speaking about herself would say 'loca.'"}, {"es": "Enséñame a cocinar esto", "lit": "Teach me to cook this", "w": [["enséñame", "teach me (enseñar + me)"], ["a", "to"], ["cocinar", "to cook"], ["esto", "this"]], "how": "'enseñar a + verb' = 'teach (how) to ___.' A lovely way to bond over his family's food."}, {"es": "Cuéntame de Cuba", "lit": "Tell me about Cuba", "w": [["cuéntame", "tell me (contar + me)"], ["de", "about"], ["Cuba", "Cuba"]], "how": "'Contar' means to tell or recount; 'de' here means 'about.' Opens up his history."}, {"es": "Gracias por tenerme paciencia", "lit": "Thanks for having patience with me", "w": [["gracias", "thanks"], ["por", "for"], ["tenerme", "to have...me (tener + me)"], ["paciencia", "patience"]], "how": "'Tener paciencia' = to be patient. 'Por + verb' = 'for ___ing,' with 'me' attached — sweet to say as you learn."}, {"es": "Estoy feliz", "lit": "I am happy", "w": [["estoy", "I am (estar)"], ["feliz", "happy"]], "how": "Moods and feelings take 'estar,' not 'ser.'"}, {"es": "Estoy cansada", "lit": "I am tired (f.)", "w": [["estoy", "I am"], ["cansada", "tired (feminine)"]], "how": "Agrees with your gender: 'cansada' for a woman, 'cansado' for a man."}, {"es": "Estoy nerviosa", "lit": "I am nervous (f.)", "w": [["estoy", "I am"], ["nerviosa", "nervous (feminine)"]], "how": "Gender agreement again — handy before meeting the family."}, {"es": "Estoy emocionada", "lit": "I am excited (f.)", "w": [["estoy", "I am"], ["emocionada", "excited (feminine)"]], "how": "A false friend: 'emocionada' means excited, not 'emotional.'"}, {"es": "No me siento bien", "lit": "I don't feel myself well", "w": [["no", "not"], ["me", "myself"], ["siento", "I feel (sentirse)"], ["bien", "well"]], "how": "'Sentirse bien' = to feel well; it's reflexive, so 'me siento.'"}, {"es": "¡Qué interesante!", "lit": "How interesting!", "w": [["qué", "how"], ["interesante", "interesting"]], "how": "'¡Qué + adjective!' = 'how ___!' Follow it with 'cuéntame más' to keep them talking."}, {"es": "Cuéntame más", "lit": "Tell me more", "w": [["cuéntame", "tell me (contar + me)"], ["más", "more"]], "how": "An easy way to keep a conversation flowing — and keep you listening."}, {"es": "Yo soy de Estados Unidos", "lit": "I am from the United States", "w": [["yo", "I"], ["soy", "am (ser)"], ["de", "from"], ["Estados Unidos", "United States"]], "how": "'ser de' = 'to be from' (origin). You'll be asked where you're from a lot."}, {"es": "Yo trabajo de...", "lit": "I work as...", "w": [["yo", "I"], ["trabajo", "work (trabajar)"], ["de", "as"]], "how": "'trabajar de' = 'to work as (a job).' e.g. 'trabajo de enfermera' = I work as a nurse."}, {"es": "Tengo una perrita", "lit": "I have a little dog (f.)", "w": [["tengo", "I have (tener)"], ["una", "a"], ["perrita", "little dog (perra + -ita)"]], "how": "'-ita' makes it little and affectionate — 'perra' (dog) becomes cute 'perrita.' Great small talk; show photos!"}, {"es": "¿Y usted, de dónde es?", "lit": "And you (formal), from where are you?", "w": [["y", "and"], ["usted", "you (formal)"], ["de", "from"], ["dónde", "where"], ["es", "are (ser)"]], "how": "Turns the question back politely. 'Ser de' for origin, with the formal 'usted.'"}, {"es": "¿Extraña su país?", "lit": "Do you (formal) miss your country?", "w": [["extraña", "you miss (formal form of extrañar)"], ["su", "your (formal)"], ["país", "country"]], "how": "The formal 'you' version of 'extrañas.' 'Su' = your (formal). A tender question for his elders."}, {"es": "Me alegro mucho por ti", "lit": "I gladden myself much for you", "w": [["me", "myself"], ["alegro", "I'm glad (alegrarse)"], ["mucho", "much"], ["por", "for"], ["ti", "you"]], "how": "'Alegrarse' = to be glad (reflexive). 'Por ti' = for you. A warm reaction to good news."}, {"es": "Eres muy amable", "lit": "You are very kind", "w": [["eres", "you are (ser)"], ["muy", "very"], ["amable", "kind"]], "how": "'Ser' for a personality trait. A genuine, easy compliment."}, {"es": "Se me olvidó la palabra", "lit": "The word forgot itself on me", "w": [["se", "(reflexive)"], ["me", "on/to me"], ["olvidó", "forgot (olvidar)"], ["la", "the"], ["palabra", "word"]], "how": "A charming no-blame construction: rather than 'I forgot,' Spanish says 'the word forgot itself on me' — it just slipped away."}, {"es": "Déjame pensar
