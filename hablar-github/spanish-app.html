const BREAKDOWN = [{"es": "¿Qué bolá, asere?", "lit": "What wave, buddy?", "w": [["qué", "what"], ["bolá", "(slang) wave / vibe"], ["asere", "buddy, dude"]], "how": "A fixed Cuban greeting. 'Bolá' is street slang (a twist on 'bola'), so don't translate it literally — the whole thing just means 'what's up?'"}, {"es": "¡Tremendo!", "lit": "Tremendous!", "w": [["tremendo", "tremendous, huge"]], "how": "Used on its own as an exclamation for anything great, big, or impressive — food, news, a party, a person."}, {"es": "Resolver", "lit": "To resolve", "w": [["resolver", "to resolve / solve"]], "how": "In Cuba this everyday verb carries a whole mindset: to find a way to get something done despite obstacles or scarcity."}, {"es": "Mi socio / mi socia", "lit": "My partner", "w": [["mi", "my"], ["socio / socia", "business partner (m/f)"]], "how": "A formal word for 'business partner' used affectionately for a close friend — like calling someone 'my guy'."}, {"es": "¡Qué volá!", "lit": "What flew!", "w": [["qué", "what"], ["volá", "(slang, from 'voló' = flew) what's going on"]], "how": "A cousin of '¿qué bolá?' — used for surprise ('no way!') or as a casual 'what's up?'"}, {"es": "Pinchar", "lit": "To prick", "w": [["pinchar", "to prick / puncture → (Cuba) to work"]], "how": "Standard Spanish 'pinchar' means to prick; in Cuba it's slang for going to work: 'tengo que pinchar' = I have to work."}, {"es": "¡Qué guapo/a!", "lit": "How brave!", "w": [["qué", "how"], ["guapo / guapa", "(Cuba) brave, tough (m/f)"]], "how": "Careful — everywhere else 'guapo' means good-looking, but in Cuba it means brave or gutsy. Context tells you which."}, {"es": "Tener coco", "lit": "To have coconut", "w": [["tener", "to have"], ["coco", "coconut → head, brains"]], "how": "'Coco' (coconut) is slang for your head, so 'to have coconut' means to be smart."}, {"es": "La máquina", "lit": "The machine", "w": [["la", "the"], ["máquina", "machine"]], "how": "Cubans call their classic vintage American cars 'máquinas' — the machine."}, {"es": "La yuma", "lit": "The yuma", "w": [["la", "the"], ["yuma", "(slang) the USA / a foreigner"]], "how": "Cuban slang for the United States (or the West generally): 'se fue pa' la yuma' = he left for the States."}, {"es": "Estar arrancado/a", "lit": "To be torn off", "w": [["estar", "to be (a state)"], ["arrancado / arrancada", "torn off, pulled out (m/f)"]], "how": "Picture being 'torn off' from your money — it means flat broke."}, {"es": "Comerse un cable", "lit": "To eat a cable", "w": [["comerse", "to eat up"], ["un", "a"], ["cable", "cable, wire"]], "how": "An idiom: 'eating a cable' means going through a really rough patch — no money, hard times."}, {"es": "Dame un toque", "lit": "Give me a touch", "w": [["dame", "give me (da + me)"], ["un", "a"], ["toque", "touch, ring"]], "how": "'A touch' = a quick call or message: 'when you arrive, give me a buzz.'"}, {"es": "Estar a millón", "lit": "To be at a million", "w": [["estar", "to be"], ["a", "at"], ["millón", "million"]], "how": "Going 'at a million' (miles an hour) means being super excited or fired up."}, {"es": "¡Qué bárbaro!", "lit": "How barbarian!", "w": [["qué", "how"], ["bárbaro", "barbarian → amazing"]], "how": "'Barbarian' flips to a compliment here — awesome, incredible, unbelievable."}, {"es": "Echar un pie", "lit": "To toss a foot", "w": [["echar", "to throw, toss"], ["un", "a"], ["pie", "foot"]], "how": "'Tossing a foot' means to dance — a very Cuban way to say let's hit the floor."}, {"es": "Mi cielo", "lit": "My sky", "w": [["mi", "my"], ["cielo", "sky, heaven"]], "how": "'My sky/heaven' is a sweet term of endearment, often from older relatives."}, {"es": "Jamar", "lit": "To eat (slang)", "w": [["jamar", "(slang) to eat"]], "how": "Casual slang for eating: 'vamos a jamar algo' = let's grab a bite."}, {"es": "Estar en candela", "lit": "To be in flame", "w": [["estar", "to be"], ["en", "in"], ["candela", "flame, fire"]], "how": "'In the flame' = in trouble, or a situation that's heated up."}, {"es": "Está fula la cosa", "lit": "The thing is fula", "w": [["está", "is"], ["fula", "(slang) bad, sketchy"], ["la", "the"], ["cosa", "thing"]], "how": "'Fula' is slang for bad or dodgy, so 'the thing is fula' means things are rough or tense."}, {"es": "Mi'jo / mi'ja", "lit": "My son / my daughter", "w": [["mi'jo / mi'ja", "squeezed form of 'mi hijo / mi hija'"]], "how": "'Mi hijo/hija' (my son/daughter) contracts to 'mi'jo/mi'ja' and is used affectionately for anyone younger. If his mom calls you this, you're in."}, {"es": "Tener flow", "lit": "To have flow", "w": [["tener", "to have"], ["flow", "(English loan) swagger, style"]], "how": "Modern slang that borrows the English word 'flow' — to have effortless cool."}, {"es": "¡Tú estás loco/a!", "lit": "You are crazy!", "w": [["tú", "you"], ["estás", "are (estar)"], ["loco / loca", "crazy (m/f)"]], "how": "Said playfully among friends — 'you're nuts!' — not an insult."}, {"es": "Coger lucha", "lit": "To grab struggle", "w": [["coger", "to take, grab"], ["lucha", "struggle, fight"]], "how": "'Grabbing struggle' means to hustle and grind hard to get ahead — high praise in Cuba."}, {"es": "Estar en el yeyo", "lit": "To be in the faint", "w": [["estar", "to be"], ["en", "in"], ["el", "the"], ["yeyo", "(slang) fainting spell, shock"]], "how": "A 'yeyo' is a dizzy/fainting spell, so being 'en el yeyo' means stunned or frozen in disbelief."}, {"es": "Echar fresco", "lit": "To throw cool air", "w": [["echar", "to throw"], ["fresco", "cool / fresh air"]], "how": "'Throwing fresh air' means to relax and cool off — let's chill."}, {"es": "¡Dale!", "lit": "Give it!", "w": [["dale", "give it (dar 'to give' + le)"]], "how": "Literally 'give it to him,' but it's the all-purpose Cuban 'go for it / alright / let's go.'"}, {"es": "Estar en la fanguita", "lit": "To be in the little mud", "w": [["estar", "to be"], ["en", "in"], ["la", "the"], ["fanguita", "little mud ('fango' = mud + -ita)"]], "how": "Stuck 'in the little mud' means caught in a mess or a jam."}, {"es": "¡Qué rico está esto!", "lit": "How tasty this is!", "w": [["qué", "how"], ["rico", "tasty, delicious"], ["está", "is"], ["esto", "this"]], "how": "'Rico' means delicious (not rich, here). A classic thing to say about the food."}, {"es": "No cojas lucha", "lit": "Don't take on struggle", "w": [["no", "don't"], ["cojas", "take (coger, command form)"], ["lucha", "struggle"]], "how": "The flip side of 'coger lucha' — 'don't take on struggle' means don't stress about it."}, {"es": "¡Bacano!", "lit": "Cool!", "w": [["bacano", "(slang) cool, awesome"]], "how": "A Colombian way to say something's great."}, {"es": "¿Quiubo, parce?", "lit": "What was there, buddy?", "w": [["quiubo", "squeezed 'qué hubo' = what was there → what's up"], ["parce", "buddy (from 'parcero')"]], "how": "'Qué hubo' collapses into 'quiubo,' and 'parce' is your pal — 'what's up, dude?'"}, {"es": "A la orden", "lit": "At the order", "w": [["a", "at"], ["la", "the"], ["orden", "order, command"]], "how": "'At your command' — used constantly as 'at your service' and also as 'you're welcome.'"}, {"es": "¡Qué chévere!", "lit": "How cool!", "w": [["qué", "how"], ["chévere", "cool, great"]], "how": "'Chévere' is as flexible as 'cool' in English."}, {"es": "Listo", "lit": "Ready", "w": [["listo", "ready"]], "how": "Literally 'ready,' but used to mean 'OK / got it / done.'"}, {"es": "Dar papaya", "lit": "To give papaya", "w": [["dar", "to give"], ["papaya", "papaya (the fruit)"]], "how": "An idiom: 'giving papaya' is leaving yourself open to trouble or theft. 'No des papaya' = don't make yourself a target."}, {"es": "Estoy mamado/a", "lit": "I'm worn out", "w": [["estoy", "I am"], ["mamado / mamada", "(slang) worn out, exhausted (m/f)"]], "how": "Very common slang for wiped out after a long day."}, {"es": "Mamar gallo", "lit": "To suck rooster", "w": [["mamar", "to suck"], ["gallo", "rooster"]], "how": "Don't take it literally — this idiom means to joke around, tease, or stall: 'deja de mamar gallo' = quit messing around."}, {"es": "Un tinto", "lit": "A tinted one", "w": [["un", "a"], ["tinto", "tinted / dark-red → (Colombia) black coffee"]], "how": "Elsewhere 'tinto' is red wine; in Colombia a 'tinto' is a small black coffee. '¿Quieres un tinto?'"}, {"es": "Berraco/a", "lit": "Wild boar", "w": [["berraco / berraca", "boar → tough, gutsy, great (m/f)"]], "how": "From 'verraco' (a boar). Calling someone 'berraco' praises their strength or skill."}, {"es": "¡Tenaz!", "lit": "Tenacious!", "w": [["tenaz", "tenacious, tough"]], "how": "Used for something intense, rough, or hard to believe: '¡tenaz ese examen!' = that test was brutal."}, {"es": "Hacer una vaca", "lit": "To make a cow", "w": [["hacer", "to make"], ["una", "a"], ["vaca", "cow"]], "how": "'Making a cow' means everyone pools their money together for something."}, {"es": "Estar en la olla", "lit": "To be in the pot", "w": [["estar", "to be"], ["en", "in"], ["la", "the"], ["olla", "pot"]], "how": "Being 'in the pot' means broke or in a tight spot."}, {"es": "Estar en mi salsa", "lit": "To be in my sauce", "w": [["estar", "to be"], ["en", "in"], ["mi", "my"], ["salsa", "sauce"]], "how": "'In my sauce' means in my element — doing what I love and thriving."}, {"es": "¡Qué mala pata!", "lit": "What a bad paw!", "w": [["qué", "what"], ["mala", "bad"], ["pata", "paw, animal leg"]], "how": "A 'bad paw' is bad luck — 'what rotten luck!'"}, {"es": "Mi amor / mi vida", "lit": "My love / my life", "w": [["mi", "my"], ["amor", "love"], ["vida", "life"]], "how": "Warm endearments used widely — for a partner, but also family and friends. Not always romantic."}, {"es": "Echar los perros", "lit": "To throw the dogs", "w": [["echar", "to throw"], ["los", "the"], ["perros", "dogs"]], "how": "'Throwing the dogs' at someone means flirting hard or hitting on them."}, {"es": "¡Qué nota!", "lit": "What a note!", "w": [["qué", "what"], ["nota", "note"]], "how": "'What a note!' means how cool. A great person can be called 'una nota.'"}, {"es": "¡Uy, juemadre!", "lit": "Whoa, geez!", "w": [["uy", "whoa, oops"], ["juemadre", "softened 'hijuemadre' = geez"]], "how": "A mild paisa (Medellín-region) exclamation of surprise."}, {"es": "¡Qué belleza!", "lit": "What beauty!", "w": [["qué", "what"], ["belleza", "beauty"]], "how": "'What beauty!' = how lovely — for a thing, a place, or a kind gesture."}, {"es": "Hágale pues", "lit": "Do it then", "w": [["hágale", "do it (hacer, command + le)"], ["pues", "then, well"]], "how": "A very paisa way to say 'sure, go ahead / let's do it.'"}, {"es": "Con mucho gusto", "lit": "With much pleasure", "w": [["con", "with"], ["mucho", "much"], ["gusto", "pleasure"]], "how": "'With much pleasure' — an extra-polite Colombian 'you're welcome' or 'gladly.'"}, {"es": "Buenos días", "lit": "Good days", "w": [["buenos", "good (masc. plural)"], ["días", "days"]], "how": "Literally 'good days' (plural) — it just means good morning."}, {"es": "Buenas tardes", "lit": "Good afternoons", "w": [["buenas", "good (fem. plural)"], ["tardes", "afternoons"]], "how": "'Good afternoons' — used from noon until sunset."}, {"es": "Buenas noches", "lit": "Good nights", "w": [["buenas", "good (fem. plural)"], ["noches", "nights"]], "how": "'Good nights' — both 'good evening' and 'goodnight.'"}, {"es": "¿Cómo está usted?", "lit": "How is you (formal)?", "w": [["cómo", "how"], ["está", "is / are"], ["usted", "you (formal)"]], "how": "'Usted' is the polite 'you,' and it takes the 'he/she' verb form ('está'). The casual version is '¿cómo estás?'"}, {"es": "Mucho gusto", "lit": "Much pleasure", "w": [["mucho", "much"], ["gusto", "pleasure"]], "how": "Short for 'mucho gusto en conocerte' — a pleasure to meet you."}, {"es": "Con permiso", "lit": "With permission", "w": [["con", "with"], ["permiso", "permission"]], "how": "'With permission' — say it to squeeze past someone or leave the table politely."}, {"es": "Disculpe", "lit": "Excuse (formal)", "w": [["disculpe", "excuse / forgive me (disculpar, formal command)"]], "how": "A polite 'excuse me' to get attention or apologize."}, {"es": "¿Me puede repetir más despacio?", "lit": "Can you repeat to me more slowly?", "w": [["me", "to me"], ["puede", "can (you, formal)"], ["repetir", "to repeat"], ["más", "more"], ["despacio", "slowly"]], "how": "'Me' is the indirect object — 'repeat it to me.' Your most useful phrase; nobody minds slowing down."}, {"es": "¿Cómo se dice... en español?", "lit": "How does one say... in Spanish?", "w": [["cómo", "how"], ["se", "one / (impersonal)"], ["dice", "says (decir)"], ["en", "in"], ["español", "Spanish"]], "how": "'Se dice' is impersonal — 'how is it said?' A great way to get people teaching you."}, {"es": "Estoy aprendiendo español", "lit": "I am learning Spanish", "w": [["estoy", "I am (estar)"], ["aprendiendo", "learning"], ["español", "Spanish"]], "how": "'estar' + a verb ending in -ando/-iendo = the present continuous, 'I am ___ing.'"}, {"es": "Estoy de acuerdo", "lit": "I am of agreement", "w": [["estoy", "I am"], ["de", "of"], ["acuerdo", "agreement"]], "how": "'I'm of agreement' is simply 'I agree.'"}, {"es": "No hay problema", "lit": "There isn't problem", "w": [["no", "no, not"], ["hay", "there is / are"], ["problema", "problem"]], "how": "'Hay' means 'there is/are,' so this is 'there's no problem.' (Note: 'problema' is masculine despite the -a.)"}, {"es": "Lo siento mucho", "lit": "I feel it much", "w": [["lo", "it"], ["siento", "I feel (sentir)"], ["mucho", "much"]], "how": "'I feel it a lot' = I'm very sorry. Works for apologies and condolences."}, {"es": "Ojalá", "lit": "Hopefully", "w": [["ojalá", "hopefully, I hope so"]], "how": "It comes from Arabic 'law šā’ Allāh' (God willing) and now just means 'hopefully.' It's usually followed by the subjunctive."}, {"es": "Tengo que irme", "lit": "I have that to go myself", "w": [["tengo", "I have"], ["que", "to (that)"], ["irme", "to go / leave (ir + me)"]], "how": "'tener que + verb' means 'have to ___.' 'Irme' is the reflexive 'to take myself off / leave.'"}, {"es": "Nos vemos pronto", "lit": "We see each other soon", "w": [["nos", "each other"], ["vemos", "we see (ver)"], ["pronto", "soon"]], "how": "'Nos' here is reciprocal — 'we see each other.' A friendly 'see you soon.'"}, {"es": "¡Salud!", "lit": "Health!", "w": [["salud", "health"]], "how": "'Health!' — used both for toasting drinks (cheers) and after a sneeze (bless you)."}, {"es": "¡Felicidades!", "lit": "Happinesses!", "w": [["felicidades", "congratulations (plural of 'felicidad')"]], "how": "The plural of 'happiness' is used to say congratulations — for birthdays, weddings, achievements."}, {"es": "Muchísimas gracias", "lit": "Very many thanks", "w": [["muchísimas", "very many (mucho + -ísimo)"], ["gracias", "thanks"]], "how": "Adding '-ísimo/a' supercharges a word. 'Muchísimas gracias' = thank you SO much."}, {"es": "No estoy segura", "lit": "I am not sure (f.)", "w": [["no", "not"], ["estoy", "I am"], ["segura", "sure (feminine)"]], "how": "Adjectives agree with your gender: a woman says 'segura,' a man says 'seguro.'"}, {"es": "Está delicioso", "lit": "It is delicious", "w": [["está", "is (estar)"], ["delicioso", "delicious"]], "how": "'Estar' is used for how something tastes right now — a current state."}, {"es": "Esto está riquísimo", "lit": "This is super-tasty", "w": [["esto", "this"], ["está", "is"], ["riquísimo", "super delicious (rico + -ísimo)"]], "how": "'Rico' (tasty) + '-ísimo' = extremely tasty. Stronger than plain 'rico' and a big compliment to the cook."}, {"es": "¿Puedo ayudar con algo?", "lit": "Can I help with something?", "w": [["puedo", "can I (poder)"], ["ayudar", "to help"], ["con", "with"], ["algo", "something"]], "how": "'poder' + a second verb = 'can I ___.' Offering to help scores big points."}, {"es": "¿Me das la receta?", "lit": "Do you give me the recipe?", "w": [["me", "to me"], ["das", "you give (dar)"], ["la", "the"], ["receta", "recipe"]], "how": "'Me' is 'to me' (indirect object). Asking for the recipe is the ultimate compliment to the cook."}, {"es": "¿Me puede pasar la sal?", "lit": "Can you pass me the salt?", "w": [["me", "to me"], ["puede", "can you (formal)"], ["pasar", "to pass"], ["la", "the"], ["sal", "salt"]], "how": "A polite table request; 'me' = to me."}, {"es": "Estoy llena, gracias", "lit": "I am full, thanks (f.)", "w": [["estoy", "I am"], ["llena", "full (feminine)"], ["gracias", "thanks"]], "how": "'Estar' for a temporary state. A woman says 'llena,' a man says 'lleno.' A polite way to pass on seconds."}, {"es": "¿Qué lleva este plato?", "lit": "What does this dish carry?", "w": [["qué", "what"], ["lleva", "carries → (with food) contains"], ["este", "this"], ["plato", "dish, plate"]], "how": "'Llevar' normally means 'to carry,' but with food it idiomatically means 'to contain / have in it.' So word-for-word it's 'what does this dish carry?' — meaning 'what's in this dish?'"}, {"es": "¿Es picante?", "lit": "Is it spicy?", "w": [["es", "is (ser)"], ["picante", "spicy"]], "how": "Here 'ser' is used because spiciness is treated as an inherent quality of the dish."}, {"es": "Gracias por invitarme", "lit": "Thanks for to-invite-me", "w": [["gracias", "thanks"], ["por", "for"], ["invitarme", "to invite me (invitar + me)"]], "how": "'por + a verb' means 'for ___ing,' and '-me' tacks 'me' onto the end: 'thanks for inviting me.'"}, {"es": "¿Quieres algo de tomar?", "lit": "Do you want something of to-drink?", "w": [["quieres", "you want (querer)"], ["algo", "something"], ["de", "of / to"], ["tomar", "to drink (or take)"]], "how": "'algo de tomar' = 'something to drink.' 'Tomar' means to drink here (it can also mean to take)."}, {"es": "El arroz con pollo", "lit": "The rice with chicken", "w": [["el", "the"], ["arroz", "rice"], ["con", "with"], ["pollo", "chicken"]], "how": "Straightforward and a beloved dish — praise it and they'll beam."}, {"es": "El lechón", "lit": "The suckling pig", "w": [["el", "the"], ["lechón", "roast/suckling pork"]], "how": "A specific food word — the Cuban celebration centerpiece."}, {"es": "Los frijoles negros", "lit": "The beans black", "w": [["los", "the"], ["frijoles", "beans"], ["negros", "black"]], "how": "In Spanish the adjective usually comes after the noun and must agree — plural and masculine here, so 'negros.'"}, {"es": "Los tostones / plátanos", "lit": "The tostones / plantains", "w": [["tostones", "twice-fried green plantains"], ["plátanos", "plantains"]], "how": "Vocabulary: 'tostones' are the savory smashed-and-fried kind; 'maduros' would be the sweet ripe kind."}, {"es": "Un cafecito", "lit": "A little coffee", "w": [["un", "a"], ["cafecito", "little coffee (café + -cito)"]], "how": "'-ito' makes things little or affectionate. 'Un cafecito' is a sweet little espresso — softens the offer, so say yes."}, {"es": "¡Qué familia tan linda!", "lit": "What a family so lovely!", "w": [["qué", "what"], ["familia", "family"], ["tan", "so"], ["linda", "lovely"]], "how": "'¡Qué ___ tan ___!' is a set frame for exclamations — 'what a so-lovely family!'"}, {"es": "Me siento como en familia", "lit": "I feel myself like in family", "w": [["me", "myself"], ["siento", "I feel (sentirse)"], ["como", "like"], ["en", "in"], ["familia", "family"]], "how": "'Sentirse' is reflexive — 'me siento' = I feel. 'Como en familia' = like among family. This line melts hearts."}, {"es": "La abuela", "lit": "The grandmother", "w": [["la", "the"], ["abuela", "grandmother"]], "how": "Vocabulary — and often the head of the household, so greet her first."}, {"es": "Cocinas delicioso", "lit": "You cook delicious", "w": [["cocinas", "you cook (tú form of cocinar)"], ["delicioso", "delicious(ly)"]], "how": "'Cocinas' is the informal 'you' form. The adjective is used adverbially here — 'you cook deliciously.'"}, {"es": "Me encantaría llevar un poquito", "lit": "It would delight me to take a little bit", "w": [["me", "to me"], ["encantaría", "would delight (conditional of encantar)"], ["llevar", "to take / carry"], ["un", "a"], ["poquito", "little bit (poco + -ito)"]], "how": "'Encantar' works backwards like 'gustar': 'me encantaría' = I'd love. 'Poquito' is a tiny, softened 'little bit.'"}, {"es": "Te amo", "lit": "I love you", "w": [["te", "you (object)"], ["amo", "I love (amar)"]], "how": "'Amar' is deep, romantic love. The object 'te' comes before the verb. Save this one for him."}, {"es": "Te quiero mucho", "lit": "I want you much", "w": [["te", "you"], ["quiero", "I love / want (querer)"], ["mucho", "much"]], "how": "'Querer' literally means 'to want,' but with people it means love — warmer and softer than 'amar,' good for family and partner alike."}, {"es": "Te extraño", "lit": "I miss you", "w": [["te", "you"], ["extraño", "I miss (extrañar)"]], "how": "'Extrañar' = to miss someone."}, {"es": "Dame un beso", "lit": "Give me a kiss", "w": [["dame", "give me (da + me)"], ["un", "a"], ["beso", "kiss"]], "how": "A command ('da') with 'me' attached — 'give me.'"}, {"es": "Eres mi persona favorita", "lit": "You are my favorite person", "w": [["eres", "you are (ser)"], ["mi", "my"], ["persona", "person"], ["favorita", "favorite (f.)"]], "how": "'Ser' for identity. 'Persona' is always feminine, so the adjective is 'favorita.'"}, {"es": "¿Qué quieres hacer hoy?", "lit": "What do you want to do today?", "w": [["qué", "what"], ["quieres", "you want (querer)"], ["hacer", "to do / make"], ["hoy", "today"]], "how": "'querer' + a second verb = 'want to ___.'"}, {"es": "¿Vemos una película?", "lit": "Do we watch a movie?", "w": [["vemos", "we see / watch (ver)"], ["una", "a"], ["película", "movie"]], "how": "The plain present tense is often used to suggest something — 'shall we watch a movie?'"}, {"es": "Que duermas rico", "lit": "May you sleep nicely", "w": [["que", "(may / that)"], ["duermas", "you sleep (subjunctive of dormir)"], ["rico", "nicely, cozily"]], "how": "'Que' + the subjunctive expresses a wish ('may you...'). 'Dormir rico' is a warm Cuban way to say sleep well."}, {"es": "Buenos días, mi amor", "lit": "Good morning, my love", "w": [["buenos días", "good morning"], ["mi", "my"], ["amor", "love"]], "how": "Tack 'mi amor' onto any greeting to warm it up."}, {"es": "Perdóname, tienes razón", "lit": "Forgive me, you have reason", "w": [["perdóname", "forgive me (perdonar + me)"], ["tienes", "you have (tener)"], ["razón", "reason / rightness"]], "how": "'Tener razón' literally 'to have reason' means 'to be right.' A handy peacemaker line."}, {"es": "No es para tanto", "lit": "It's not for so much", "w": [["no", "not"], ["es", "is"], ["para", "for"], ["tanto", "so much"]], "how": "A set idiom meaning 'it's not that big a deal.'"}, {"es": "Hablemos de esto con calma", "lit": "Let's talk about this with calm", "w": [["hablemos", "let's talk (hablar, -emos)"], ["de", "about"], ["esto", "this"], ["con", "with"], ["calma", "calm"]], "how": "The '-emos' ending is the 'let's ___' form. 'Con calma' = calmly."}, {"es": "Me haces muy feliz", "lit": "You make me very happy", "w": [["me", "me"], ["haces", "you make (hacer)"], ["muy", "very"], ["feliz", "happy"]], "how": "'Hacer' = to make; 'me haces feliz' = you make me happy."}, {"es": "Estamos juntos en esto", "lit": "We are together in this", "w": [["estamos", "we are (estar)"], ["juntos", "together"], ["en", "in"], ["esto", "this"]], "how": "'Estar' for a state. 'Juntos' defaults to the masculine plural for a mixed pair."}, {"es": "¡Tú estás loco!", "lit": "You are crazy!", "w": [["tú", "you"], ["estás", "are (estar)"], ["loco", "crazy (m)"]], "how": "Playful teasing — 'you're nuts!' A woman speaking about herself would say 'loca.'"}, {"es": "Enséñame a cocinar esto", "lit": "Teach me to cook this", "w": [["enséñame", "teach me (enseñar + me)"], ["a", "to"], ["cocinar", "to cook"], ["esto", "this"]], "how": "'enseñar a + verb' = 'teach (how) to ___.' A lovely way to bond over his family's food."}, {"es": "Cuéntame de Cuba", "lit": "Tell me about Cuba", "w": [["cuéntame", "tell me (contar + me)"], ["de", "about"], ["Cuba", "Cuba"]], "how": "'Contar' means to tell or recount; 'de' here means 'about.' Opens up his history."}, {"es": "Gracias por tenerme paciencia", "lit": "Thanks for having patience with me", "w": [["gracias", "thanks"], ["por", "for"], ["tenerme", "to have...me (tener + me)"], ["paciencia", "patience"]], "how": "'Tener paciencia' = to be patient. 'Por + verb' = 'for ___ing,' with 'me' attached — sweet to say as you learn."}, {"es": "Estoy feliz", "lit": "I am happy", "w": [["estoy", "I am (estar)"], ["feliz", "happy"]], "how": "Moods and feelings take 'estar,' not 'ser.'"}, {"es": "Estoy cansada", "lit": "I am tired (f.)", "w": [["estoy", "I am"], ["cansada", "tired (feminine)"]], "how": "Agrees with your gender: 'cansada' for a woman, 'cansado' for a man."}, {"es": "Estoy nerviosa", "lit": "I am nervous (f.)", "w": [["estoy", "I am"], ["nerviosa", "nervous (feminine)"]], "how": "Gender agreement again — handy before meeting the family."}, {"es": "Estoy emocionada", "lit": "I am excited (f.)", "w": [["estoy", "I am"], ["emocionada", "excited (feminine)"]], "how": "A false friend: 'emocionada' means excited, not 'emotional.'"}, {"es": "No me siento bien", "lit": "I don't feel myself well", "w": [["no", "not"], ["me", "myself"], ["siento", "I feel (sentirse)"], ["bien", "well"]], "how": "'Sentirse bien' = to feel well; it's reflexive, so 'me siento.'"}, {"es": "¡Qué interesante!", "lit": "How interesting!", "w": [["qué", "how"], ["interesante", "interesting"]], "how": "'¡Qué + adjective!' = 'how ___!' Follow it with 'cuéntame más' to keep them talking."}, {"es": "Cuéntame más", "lit": "Tell me more", "w": [["cuéntame", "tell me (contar + me)"], ["más", "more"]], "how": "An easy way to keep a conversation flowing — and keep you listening."}, {"es": "Yo soy de Estados Unidos", "lit": "I am from the United States", "w": [["yo", "I"], ["soy", "am (ser)"], ["de", "from"], ["Estados Unidos", "United States"]], "how": "'ser de' = 'to be from' (origin). You'll be asked where you're from a lot."}, {"es": "Yo trabajo de...", "lit": "I work as...", "w": [["yo", "I"], ["trabajo", "work (trabajar)"], ["de", "as"]], "how": "'trabajar de' = 'to work as (a job).' e.g. 'trabajo de enfermera' = I work as a nurse."}, {"es": "Tengo una perrita", "lit": "I have a little dog (f.)", "w": [["tengo", "I have (tener)"], ["una", "a"], ["perrita", "little dog (perra + -ita)"]], "how": "'-ita' makes it little and affectionate — 'perra' (dog) becomes cute 'perrita.' Great small talk; show photos!"}, {"es": "¿Y usted, de dónde es?", "lit": "And you (formal), from where are you?", "w": [["y", "and"], ["usted", "you (formal)"], ["de", "from"], ["dónde", "where"], ["es", "are (ser)"]], "how": "Turns the question back politely. 'Ser de' for origin, with the formal 'usted.'"}, {"es": "¿Extraña su país?", "lit": "Do you (formal) miss your country?", "w": [["extraña", "you miss (formal form of extrañar)"], ["su", "your (formal)"], ["país", "country"]], "how": "The formal 'you' version of 'extrañas.' 'Su' = your (formal). A tender question for his elders."}, {"es": "Me alegro mucho por ti", "lit": "I gladden myself much for you", "w": [["me", "myself"], ["alegro", "I'm glad (alegrarse)"], ["mucho", "much"], ["por", "for"], ["ti", "you"]], "how": "'Alegrarse' = to be glad (reflexive). 'Por ti' = for you. A warm reaction to good news."}, {"es": "Eres muy amable", "lit": "You are very kind", "w": [["eres", "you are (ser)"], ["muy", "very"], ["amable", "kind"]], "how": "'Ser' for a personality trait. A genuine, easy compliment."}, {"es": "Se me olvidó la palabra", "lit": "The word forgot itself on me", "w": [["se", "(reflexive)"], ["me", "on/to me"], ["olvidó", "forgot (olvidar)"], ["la", "the"], ["palabra", "word"]], "how": "A charming no-blame construction: rather than 'I forgot,' Spanish says 'the word forgot itself on me' — it just slipped away."}, {"es": "Déjame pensar function speak(text, rate){
  try{
    if(!window.speechSynthesis || typeof SpeechSynthesisUtterance==="undefined" || !text) return;
    window.speechSynthesis.cancel();
    const clean = text.replace(/\([^)]*\)/g,'').trim();
    if(!clean) return;
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = "es-US"; u.rate = rate || .9;
    const v = VOICES.find(v=>/es(-|_)?(419|US|MX|CO)/i.test(v.lang)) || VOICES.find(v=>v.lang.toLowerCase().startsWith("es"));

  }catch(e){/* audio unavailable — fail silently */}
}

/* ---------- persistent progress ---------- */
const KEY = "hablar_progress_v1";
const todayStr = () => new Date().toISOString().slice(0,10);
function loadProg(){
  try{ const p = JSON.parse(localStorage.getItem(KEY)); if(p) return p; }catch(e){}
  return { xp:0, streak:0, lastDay:null, dayXp:0, dayXpDate:todayStr(),
           boxes:{}, seen:{}, struggling:{}, saved:{}, quizBest:0, scenariosDone:{}, listenBest:0 };
}
function useProg(){
  const [prog, setProg] = useState(loadProg);
  useEffect(()=>{ localStorage.setItem(KEY, JSON.stringify(prog)); },[prog]);
  const touchDay = (p) => {
    const t = todayStr();
    let np = {...p};
    if(np.dayXpDate !== t){ np.dayXpDate = t; np.dayXp = 0; }
    if(np.lastDay !== t){
      const yest = new Date(Date.now()-864e5).toISOString().slice(0,10);
      np.streak = (np.lastDay === yest) ? (np.streak||0)+1 : 1;
      np.lastDay = t;
    }
    return np;
  };
  const addXp = (n) => setProg(p=>{ let np = touchDay(p); np.xp=(np.xp||0)+n; np.dayXp=(np.dayXp||0)+n; return np; });
  const rate = (id, good) => setProg(p=>{
    let np = touchDay(p); np.boxes = {...np.boxes}; np.seen={...np.seen}; np.struggling={...(np.struggling||{})};
    const cur = np.boxes[id] || 0;
    np.boxes[id] = good ? Math.min(cur+1,5) : 1;
    np.seen[id] = true;
    if(good){ if(np.boxes[id]>=4) delete np.struggling[id]; }  // graduated out of practice pile
    else { np.struggling[id] = true; }                        // missed → into Needs practice
    np.xp=(np.xp||0)+(good?4:1); np.dayXp=(np.dayXp||0)+(good?4:1);
    return np;
  });
  const finishScenario = (id) => setProg(p=>{ let np=touchDay(p); np.scenariosDone={...np.scenariosDone,[id]:true};
    np.xp=(np.xp||0)+20; np.dayXp=(np.dayXp||0)+20; return np; });
  const setQuizBest = (s) => setProg(p=>({...p, quizBest:Math.max(p.quizBest||0,s)}));
  const setListenBest = (s) => setProg(p=>({...p, listenBest:Math.max(p.listenBest||0,s)}));
  const toggleSave = (id) => setProg(p=>{ const sv={...(p.saved||{})}; if(sv[id]) delete sv[id]; else sv[id]=true; return {...p, saved:sv}; });
  const reset = () => setProg(loadProg());

}

function buildCorpus(){
  const out=[]; const seen=new Set();
  const add=(es,en)=>{ if(!es) return; es=(""+es).trim(); if(!es||seen.has(es)) return; seen.add(es); out.push({es,en:en||""}); };

async function translateES(text){
  try{
    const r = await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair=es|en");
    if(r.ok){ const j = await r.json(); const t = j && j.responseData && j.responseData.translatedText;
      if(t && !/PLEASE SELECT|INVALID|QUERY LENGTH|MYMEMORY WARNING/i.test(t)) return {en:t, rough:false}; }
  }catch(e){}
  return {en: glossES(text), rough:true};
}
function MyPhrases(){
  const [items,setItems]=useState(loadMine);
  const [txt,setTxt]=useState("");
  const [note,setNote]=useState("");
  const [sel,setSel]=useState(null);
  const [editId,setEditId]=useState(null);
  const [editVal,setEditVal]=useState("");
  useEffect(()=>{ try{ localStorage.setItem(MYKEY, JSON.stringify(items)); }catch(e){} },[items]);
  function translateInto(id, es){
    setItems(prev=>prev.map(p=>p.id===id?{...p,translating:true}:p));
    translateES(es).then(r=>{ setItems(prev=>prev.map(p=>p.id===id?{...p,en:r.en,rough:r.rough,translating:false}:p)); });
  }
  function add(){
    const es=txt.trim(); if(!es) return;
    const id=Date.now();
    setItems(prev=>[{id, es, en:"", rough:false, note:note.trim(), translating:true}, ...prev]);
    setTxt(""); setNote("");
    translateES(es).then(r=>{ setItems(prev=>prev.map(p=>p.id===id?{...p,en:r.en,rough:r.rough,translating:false}:p)); });
  }
  function del(id){ setItems(items.filter(i=>i.id!==id)); setSel(x=> x&&x.pid===id ? null : x); }
  function startEdit(it){ setEditId(it.id); setEditVal(it.en||""); }
  function saveEdit(id){ setItems(prev=>prev.map(p=>p.id===id?{...p,en:editVal.trim(),rough:false}:p)); setEditId(null); }
  return (
    <div className="page">
      <div className="h-hello" style={{fontSize:24}}>My phrases</div>
      <p className="h-sub">Heard something you want to keep? Just type the Spanish — the meaning fills in automatically. Then tap any word to hear it and dig in.</p>
      <div className="mp-add">
        <input className="mp-input" placeholder="Type a Spanish phrase you heard…" value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") add(); }}/>
        <input className="mp-note" placeholder="Note to self (optional)" value={note} onChange={e=>setNote(e.target.value)}/>
        <button className="rp-cta" onClick={add} disabled={!txt.trim()}>＋ Save phrase</button>
      </div>
      {items.length===0 ? (
        <div className="empty">No saved phrases yet. Type one above and I'll translate it for you ⤴</div>
      ) : items.map(it=>(
        <div key={it.id} className="mp-card">
          <div className="mp-top">
            <button className="mp-hear" onClick={()=>speak(it.es)}>🔊</button>
            <button className="mp-del" onClick={()=>del(it.id)} title="Delete">✕</button>
          </div>
          <div className="mp-es">
            <ClickableSentence text={it.es} onWord={(w)=>{ const k=wnorm(w); if(!k) return; speak(k); setSel({pid:it.id, word:w}); }}/>
          </div>
          {editId===it.id ? (
            <div className="mp-editrow">
              <input value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") saveEdit(it.id); }} placeholder="Type the meaning"/>
              <button onClick={()=>saveEdit(it.id)}>Save</button>
            </div>
          ) : (
            <div className="mp-mean">
              {it.translating ? <span className="mp-loading">Translating…</span>
                : it.en ? <>
                    <span className="mp-mean-txt">{it.en}</span>
                    {it.rough && <span className="mp-rough" title="Rough offline translation — tap the pencil to fix">rough</span>}
                  </>
                : <span className="mp-loading">No meaning yet</span>}
              <button className="mp-retro" style={{marginLeft:"auto"}} title="Re-translate" onClick={()=>translateInto(it.id, it.es)}>↻</button>
              <button className="mp-edit" title="Edit meaning" onClick={()=>startEdit(it)}>✎</button>
            </div>
          )}
          {it.note && <div className="mp-note-txt">📝 {it.note}</div>}
          {sel && sel.pid===it.id && <WordDetail raw={sel.word} exclude={it.es} close={()=>setSel(null)}/>}
        </div>
      ))}
      <div className="pill-tip">💡 The meaning auto-fills when you're online; offline you'll get a quick word-by-word version marked “rough” — tap ✎ to fix any translation. Tap any word for its meaning &amp; examples.</div>
    </div>
  );
}

/* ================= LEARN (flashcards + spaced repetition) ================= */
function buildQueue(deckKey, prog){
  if(deckKey==="needs" || deckKey==="saved"){
    const src = deckKey==="needs" ? (prog.struggling||{}) : (prog.saved||{});
    return Object.keys(src).filter(id=>src[id]).map(id=>{
      const u = id.lastIndexOf("_");
      const dk = id.slice(0,u), idx = +id.slice(u+1);
      const it = DECKS[dk] && DECKS[dk].items[idx];
      return it ? {it, id, dk} : null;
    }).filter(Boolean).sort(()=>Math.random()-.5);
  }
  const deck = DECKS[deckKey];
  return deck.items.map((it,i)=>({it, id:deckKey+"_"+i, dk:deckKey, box:prog.boxes[deckKey+"_"+i]||0}))
    .sort((a,b)=> (a.box-b.box) || (Math.random()-.5));
}
function Learn({prog, rate, toast, toggleSave}){
  const deckKeys = Object.keys(DECKS);
  const [deckKey, setDeckKey] = useState("meals");
  const [queue, setQueue] = useState(()=>buildQueue("meals", prog));
  const [pos, setPos] = useState(0);
  const [flip, setFlip] = useState(false);
  const [missed, setMissed] = useState(0);
  useEffect(()=>{ setQueue(buildQueue(deckKey, prog)); setPos(0); setFlip(false); setMissed(0); },[deckKey]); // eslint-disable-line

  const isNeeds = deckKey==="needs";
  const isSaved = deckKey==="saved";
  const special = isNeeds||isSaved;
  const realDeck = DECKS[deckKey];
  const needCount = Object.keys(prog.struggling||{}).length;
  const savedCount = Object.keys(prog.saved||{}).length;
  const blurb = isNeeds
    ? "The cards you've missed, gathered in one place. Drill them until they stick — a card leaves this pile once you've nailed it a few times."
    : isSaved
    ? "Your hand-picked phrases — the ones you want at your fingertips. Tap the star on any card to add it here."
    : realDeck.blurb;
  const cur = queue[pos];
  const finished = !cur;
  const mastered = realDeck ? realDeck.items.filter((_,i)=> (prog.boxes[deckKey+"_"+i]||0)>=4).length : 0;
  const curSaved = cur ? !!(prog.saved && prog.saved[cur.id]) : false;

  function answer(good){
    rate(cur.id, good);
    setFlip(false);
    if(good){ toast("Nice · +4 XP"); setTimeout(()=> setPos(p=>p+1), 180); }
    else{
      toast("Added to Needs practice"); setMissed(m=>m+1);
      setQueue(q=>{ const nq=[...q]; nq.push({...cur}); return nq; });
      setTimeout(()=> setPos(p=>p+1), 180);
    }
  }
  function restart(){ setQueue(buildQueue(deckKey, prog)); setPos(0); setFlip(false); setMissed(0); }
  const tdeck = cur ? DECKS[cur.dk] : realDeck;

  return (
    <div className="page">
      <div className="chips wrap" style={{marginBottom:6}}>
        <button className={"chip "+(isSaved?"on":"")} onClick={()=>setDeckKey("saved")}
          style={isSaved?{}:{borderColor:"var(--colombia)",color:"var(--colombia)"}}>
          ⭐ Saved{savedCount?` (${savedCount})`:""}
        </button>
        <button className={"chip "+(isNeeds?"on":"")} onClick={()=>setDeckKey("needs")}
          style={isNeeds?{}:{borderColor:"var(--accent)",color:"var(--accent)"}}>
          🔁 Needs practice{needCount?` (${needCount})`:""}
        </button>
        {deckKeys.map(k=>(
          <button key={k} className={"chip "+(k===deckKey?"on":"")} onClick={()=>setDeckKey(k)}>
            {DECKS[k].flag} {DECKS[k].label}
          </button>
        ))}
      </div>
      <p className="h-sub" style={{margin:"2px 2px 4px"}}>{blurb}</p>

      {finished ? (
        (queue.length===0) ? (
          <div className="card done-card">
            <div className="big">{isSaved?"⭐":"🔁"}</div>
            <h2>{isSaved?"No saved cards yet":isNeeds?"Your practice pile is empty":"Nothing here yet"}</h2>
            <p>{isSaved
              ? "Tap the star on any card to save it here — perfect for the phrases you'll use all the time."
              : isNeeds
              ? "When you tap I didn't know on a card, it collects here so you can focus on just the tricky ones."
              : "This deck has no cards."}</p>
            {special && <button className="rp-cta" style={{maxWidth:240,margin:"0 auto"}} onClick={()=>setDeckKey("meals")}>Study a deck →</button>}
          </div>
        ) : (
          <div className="card done-card">
            <div className="big">🎉</div>
            <h2>{isNeeds?"Practice round done!":isSaved?"Saved set done!":"Deck complete!"}</h2>
            <p>{missed>0
              ? `You got through it, and ${missed} tricky one${missed>1?"s are":" is"} saved in Needs practice. Keep drilling and they'll stick.`
              : (special?"Nicely done — run it again anytime.":`All ${mastered} of ${realDeck.items.length} mastered. Come back tomorrow and the tricky ones surface first.`)}</p>
            <button className="rp-cta" style={{maxWidth:240,margin:"0 auto"}} onClick={restart}>{special?"Practice again":"Review again"}</button>
          </div>
        )
      ) : (
        <>
          <div className="deck-head">
            <div className="cnt">Card {pos+1} of {queue.length}</div>
            <div className="cnt">{isNeeds? `${needCount} in your pile` : isSaved? `${savedCount} saved` : `${mastered}/${realDeck.items.length} mastered`}</div>
          </div>
          <div className="fc-progress"><div style={{width:((pos)/queue.length*100)+"%"}}/></div>
          <div className="fc-stage">
            <button className={"fc-star "+(curSaved?"on":"")} title="Save this phrase"
              onClick={(e)=>{e.stopPropagation(); toggleSave(cur.id); toast(curSaved?"Removed from Saved":"⭐ Saved");}}>
              {curSaved?"★":"☆"}
            </button>
            <div className={"fc "+(flip?"flip":"")} onClick={()=>setFlip(f=>!f)}>
              <div className="fc-face">
                <span className="fc-tag" style={{background:tdeck.soft,color:tdeck.color}}>{tdeck.flag} {tdeck.label}</span>
                <div className="fc-emoji">{cur.it.e}</div>
                <div className="fc-es">{cur.it.es}</div>
                {cur.it.pron && <div className="fc-pron">{cur.it.pron}</div>}
                <SpeakPill text={cur.it.es}/>
                <div className="fc-hint">tap to flip · then rate yourself</div>
              </div>
              <div className="fc-face fc-back">
                <span className="fc-tag" style={{background:tdeck.soft,color:tdeck.color}}>meaning</span>
                <div className="fc-en">{cur.it.en}</div>
                {cur.it.ex ? <div className="fc-ex spk" onClick={(e)=>{e.stopPropagation();speak(cur.it.ex);}}>"{cur.it.ex}"</div> : null}
                <div className="fc-note">{cur.it.note}</div>
                <div className="fc-hint">did you know it?</div>
              </div>
            </div>
          </div>
          <div className="fc-actions">
            <button className="fc-btn again" onClick={()=>answer(false)}>✗ I didn't know</button>
            <button className="fc-btn got" onClick={()=>answer(true)}>✓ I knew it</button>
          </div>
          <BreakItDown key={cur.id} item={cur.it}/>
          <div className="pill-tip">💡 Tap the star to save a phrase, or "I didn't know" to send it to Needs practice. Hit "Break it down" to see how the sentence works.</div>
        </>
      )}
    </div>
  );
}

  const keys = Object.keys(DECKS);
  const all = keys.flatMap(k=> DECKS[k].items.map(it=>({...it, _k:k})));

function Roleplay({scn, back, done, finish, toast}){
  const [step, setStep] = useState(0);
  const [picked, setPicked] = useState(null);
  const [history, setHistory] = useState([]); // {who,es,en, me?}
  const [finished, setFinished] = useState(false);
  const scrollRef = useRef(null);
  const s = scn.steps[step];

  useEffect(()=>{ if(scrollRef.current && scrollRef.current.scrollIntoView) scrollRef.current.scrollIntoView({behavior:"smooth",block:"end"}); },[history,picked,step]);

  function pick(ci){
    if(picked!==null) return;
    setPicked(ci);
    const ch = s.choices[ci];
    if(ch.ok) speak(ch.es);
  }
  function next(){
    const ch = s.choices[picked];
    const newHist = [...history];
    if(s.es) newHist.push({who:s.who, es:s.es, en:s.en, tip:null});
    newHist.push({who:"You", es:ch.es, en:ch.en, me:true});
    setHistory(newHist);
    setPicked(null);
    if(step+1>=scn.steps.length){
      setFinished(true);
      if(!done){ finish(scn.id); toast("Scenario complete · +20 XP"); }
    } else setStep(step+1);
  }

  return (
    <div className="page">
      <button className="back-btn" onClick={back}>‹ All scenarios</button>
      <div className="scn-top" style={{background:scn.grad,borderRadius:"var(--r-lg)",marginBottom:14}}>
        <span className="lvl">{scn.level}</span>
        <h3>{scn.icon} {scn.title}</h3>
      </div>
      <div className="rp-scene">🎬 {scn.setting}</div>
      <div className="rp-wrap">
        {history.map((h,i)=>(
          <div key={i} className={"bubble-row "+(h.me?"me":"")}>
            <div style={{maxWidth:"86%"}}>
              <div className="who-tag" style={{textAlign:h.me?"right":"left"}}>{h.who}</div>
              <div className={"bubble "+(h.me?"me-b":"them")}>
                <div className="b-es spk" onClick={()=>speak(h.es)}>{h.es}</div>
                <div className="b-en">{h.en}</div>
              </div>
            </div>
          </div>
        ))}

        {!finished && (
          <>
            {s.es && (
              <div className="bubble-row">
                <div style={{maxWidth:"86%"}}>
                  <div className="who-tag">{s.who}</div>
                  <div className="bubble them">
                    <div className="b-es spk" onClick={()=>speak(s.es)}>{s.es}</div>
                    <div className="b-en">{s.en}</div>
                  </div>
                </div>
              </div>
            )}
            <div className="who-tag" style={{marginTop:6}}>👉 {s.q}</div>
            <div className="choices">
              {s.choices.map((c,ci)=>{
                let cls="choice";
                if(picked!==null){ if(ci===picked) cls+= c.ok?" correct":" wrong"; else if(c.ok) cls+=" correct"; }
                return (
                  <button key={ci} className={cls} onClick={()=>pick(ci)} disabled={picked!==null}>
                    <div className="c-es">{c.es}</div>
                    <div className="c-en">{c.en}</div>
                  </button>
                );
              })}
            </div>
            {picked!==null && (
              <>
                <div className={"rp-feedback "+(s.choices[picked].ok?"ok":"no")}>
                  {s.choices[picked].ok?"✓ ":"✗ "}{s.choices[picked].fb}
                </div>
                <button className="rp-cta" onClick={next}>
                  {step+1>=scn.steps.length?"Finish scenario →":"Continue →"}
                </button>
              </>
            )}
          </>
        )}

        {finished && (
          <div className="card done-card" style={{marginTop:4}}>
            <div className="big">💛</div>
            <h2>You did it!</h2>
            <p>{scn.win}</p>
            <button className="rp-cta" style={{maxWidth:240,margin:"0 auto"}} onClick={back}>Back to scenarios</button>
          </div>
        )}
        <div ref={scrollRef}/>
      </div>
    </div>
  );
}

/* ================= LISTENING ================= */
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function Listen({setListenBest, addXp, prog, toast}){
  const [round, setRound] = useState(()=>shuffle(LISTEN).slice(0,10));
  const [idx, setIdx] = useState(0);
  const [opts, setOpts] = useState([]);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [slow, setSlow] = useState(false);
  const [playing, setPlaying] = useState(false);
  const [finished, setFinished] = useState(false);
  const [showText, setShowText] = useState(false);
  const [sel, setSel] = useState(null);
  const cur = round[idx];

  useEffect(()=>{ if(cur){ setOpts(shuffle(cur.d)); setPicked(null); setShowText(false); setSel(null);
    const t=setTimeout(()=>play(),400); return ()=>clearTimeout(t);} },[idx,round]); // eslint-disable-line

  function play(){ setPlaying(true); speak(cur.es, slow?.62:.92); setTimeout(()=>setPlaying(false),1400); }
  function choose(o){ if(picked!==null) return; setPicked(o); if(o===cur.en){ setScore(s=>s+1); addXp(5); } }
  function next(){ if(idx+1>=round.length){ setFinished(true); } else setIdx(idx+1); }
  useEffect(()=>{ if(finished){ setListenBest(score); } },[finished]); // eslint-disable-line

  if(finished){
    const pct = Math.round(score/round.length*100);
    return (
      <div className="page">
        <div className="card done-card">
          <div className="big">{pct>=80?"👂✨":pct>=50?"👍":"🌱"}</div>
          <h2>{score}/{round.length} correct</h2>
          <p>{pct>=80?"Your ear is getting sharp! Cuban fast-talk won't catch you off guard.":pct>=50?"Solid progress. Keep training — repetition is everything.":"Every rep counts. Try the slow speed and go again."}</p>
          <button className="rp-cta" style={{maxWidth:240,margin:"0 auto"}} onClick={()=>{setRound(shuffle(LISTEN).slice(0,10));setIdx(0);setScore(0);setFinished(false);}}>New round</button>
        </div>
      </div>
    );
  }
  const revealed = showText || picked!==null;
  return (
    <div className="page">
      <div className="h-hello" style={{fontSize:24}}>Listening practice</div>
      <p className="h-sub">Tap to hear it, then pick the meaning. Stuck? Reveal the phrase and tap any word.</p>
      <div className="quiz-meta" style={{marginTop:16}}><span>#{idx+1} of {round.length}</span><span>Score {score}</span></div>
      <div className="quiz-bar"><div style={{width:(idx/round.length*100)+"%"}}/></div>
      <div className="listen-card">
        <button className={"big-speak "+(playing?"playing":"")} onClick={play}>🔊</button>
        <div className="listen-hint">{playing?"Listen…":"Tap to replay"}</div>
        <div className="speed-toggle">
          <button className={!slow?"on":""} onClick={()=>setSlow(false)}>Normal</button>
          <button className={slow?"on":""} onClick={()=>setSlow(true)}>Slow 🐢</button>
        </div>
        {!revealed && <button className="bd-toggle" style={{maxWidth:300,margin:"4px auto 0"}} onClick={()=>setShowText(true)}>👁 Show the phrase</button>}
      </div>
      {revealed && (
        <div className="reveal" style={{textAlign:"left"}}>
          <div className="wp-ex-h" style={{marginBottom:6}}>The phrase · tap any word</div>
          <div className="r-es" style={{textAlign:"left",lineHeight:1.5,fontSize:22}}>
            <ClickableSentence text={cur.es} onWord={(w)=>{ const k=wnorm(w); if(!k) return; speak(k); setSel(w); }}/>
            <span className="spk" style={{marginLeft:6,cursor:"pointer"}} onClick={()=>speak(cur.es)}>🔊</span>
          </div>
          {picked!==null && <div className="r-en" style={{marginTop:4}}>{cur.en}</div>}
          {sel && <WordDetail raw={sel} exclude={cur.es} close={()=>setSel(null)}/>}
        </div>
      )}
      <div style={{marginTop:14}}>
        {opts.map((o,i)=>{
          let cls="opt";
          if(picked!==null){ if(o===cur.en) cls+=" correct"; else if(o===picked) cls+=" wrong"; }
          return <button key={i} className={cls} onClick={()=>choose(o)} disabled={picked!==null}>{o}</button>;
        })}
      </div>
      {picked!==null && (
        <button className="rp-cta" style={{maxWidth:240,margin:"14px auto 0"}} onClick={next}>{idx+1>=round.length?"See results →":"Next →"}</button>
      )}
    </div>
  );
}

/* ================= QUIZ ================= */
function Quiz({setQuizBest, addXp, prog}){
  const [round, setRound] = useState(()=>shuffle(QUIZ).slice(0,10));
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const [showHint, setShowHint] = useState(false);
  const q = round[idx];
  function pick(i){ if(picked!==null) return; setPicked(i); if(i===q.c){ setScore(s=>s+1); addXp(5);} }
  function next(){ setShowHint(false); if(idx+1>=round.length){ setFinished(true); setQuizBest(score);} else { setIdx(idx+1); setPicked(null);} }
  if(finished){
    const pct=Math.round(score/round.length*100);
    let msg="Every round makes it stick. ¡Sigue así!", emoji="🌱";
    if(pct===100){msg="¡PERFECTO! Flawless round, Jenna. 🌟";emoji="🏆";}
    else if(pct>=80){msg="¡Excelente! You really know this.";emoji="🎉";}
    else if(pct>=60){msg="¡Muy bien! Solid — keep going.";emoji="👏";}
    return (
      <div className="page"><div className="card done-card">
        <div className="big">{emoji}</div>
        <h2>{score}/{round.length}</h2>
        <p>{msg} {prog.quizBest>0 && `Best: ${prog.quizBest}/10.`}</p>
        <button className="rp-cta" style={{maxWidth:240,margin:"0 auto"}} onClick={()=>{setRound(shuffle(QUIZ).slice(0,10));setIdx(0);setScore(0);setPicked(null);setFinished(false);setShowHint(false);}}>Try again</button>
      </div></div>
    );
  }
  return (
    <div className="page">
      <div className="quiz-wrap">
        <div className="quiz-meta"><span>Question {idx+1} of {round.length}</span><span>Score {score}</span></div>
        <div className="quiz-bar"><div style={{width:(idx/round.length*100)+"%"}}/></div>
        <div className="quiz-q">{q.q}</div>
        {q.o.map((o,i)=>{
          let cls="opt"; if(picked!==null){ if(i===q.c) cls+=" correct"; else if(i===picked) cls+=" wrong"; }
          return <button key={i} className={cls} onClick={()=>pick(i)} disabled={picked!==null}>{String.fromCharCode(65+i)}. {o}</button>;
        })}
        {picked===null && !showHint && q.hint && <button className="bd-toggle" style={{marginTop:4}} onClick={()=>setShowHint(true)}>💡 Need a hint?</button>}
        {picked===null && showHint && q.hint && <div className="quiz-hint" style={{marginTop:10}}>💡 {q.hint}</div>}
        {picked!==null && <div className="quiz-hint">{picked===q.c?"✓ Correct! ":"✗ Not quite. "}{q.h}</div>}
        {picked!==null && <button className="rp-cta" style={{marginTop:14}} onClick={next}>{idx+1>=round.length?"See results →":"Next question →"}</button>}
      </div>
    </div>
  );
}

/* ================= VERBS ================= */
function VerbTest(){
  const topics=[["serestar","SER vs ESTAR"],["present","Present"],["past","Past"],["future","Future"],["mix","Everyday mix"]];
  const [topic,setTopic]=useState("serestar");
  const [round,setRound]=useState(()=>shuffle(VERBQUIZ.serestar).slice(0,8));
  const [idx,setIdx]=useState(0);
  const [picked,setPicked]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const [sel,setSel]=useState(null);
  function load(t){ setTopic(t); setRound(shuffle(VERBQUIZ[t]).slice(0,8)); setIdx(0); setPicked(null); setScore(0); setDone(false); setSel(null); }
  const q=round[idx];
  function pick(i){ if(picked!==null) return; setPicked(i); if(i===q.c) setScore(s=>s+1); }
  function next(){ setSel(null); if(idx+1>=round.length) setDone(true); else { setIdx(idx+1); setPicked(null); } }
  const parts = q ? q.s.split("___") : ["",""];
  const onWord = (t)=>{ const k=wnorm(t); if(!k) return; speak(k); setSel(t); };
  return (
    <div style={{marginTop:10}}>
      <div className="chips" style={{marginBottom:10}}>
        {topics.map(([k,l])=>(
          <button key={k} className={"chip "+(k===topic?"on":"")} onClick={()=>load(k)}>{l}</button>
        ))}
      </div>
      {done ? (
        <div className="card done-card">
          <div className="big">{score>=Math.ceil(round.length*0.8)?"🏆":score>=Math.ceil(round.length*0.5)?"👏":"🌱"}</div>
          <h2>{score}/{round.length}</h2>
          <p>{score===round.length?"¡Perfecto! You nailed every one.":score>=Math.ceil(round.length*0.6)?"Nice — the verb rules are clicking.":"Good practice — read the explanations and run it again."}</p>
          <button className="rp-cta" style={{maxWidth:240,margin:"0 auto"}} onClick={()=>load(topic)}>Try again</button>
        </div>
      ) : (
        <div className="quiz-wrap">
          <div className="quiz-meta"><span>Question {idx+1} of {round.length}</span><span>Score {score}</span></div>
          <div className="quiz-bar"><div style={{width:(idx/round.length*100)+"%"}}/></div>
          <div className="quiz-q" style={{fontSize:20,lineHeight:1.55}}>
            <ClickableSentence text={parts[0]} onWord={onWord}/>
            <span className="vt-blank" onClick={picked!==null?()=>onWord(q.opts[q.c]):undefined}>{picked!==null?q.opts[q.c]:"?"}</span>
            <ClickableSentence text={parts[1]} onWord={onWord}/>
          </div>
          <button className="bd-toggle" onClick={()=>speak((picked!==null?q.s.replace("___",q.opts[q.c]):q.s.replace("___"," ")).replace(/\s+/g," "))}>🔊 Hear the sentence</button>
          {sel && <WordCard raw={sel} close={()=>setSel(null)}/>}
          <div className="vt-hint" style={{marginTop:12}}>💬 {q.hint} · <span style={{color:"var(--text-faint)"}}>tap any word to hear it &amp; see its meaning</span></div>
          {q.opts.map((o,i)=>{
            let cls="opt"; if(picked!==null){ if(i===q.c) cls+=" correct"; else if(i===picked) cls+=" wrong"; }
            return <button key={i} className={cls} onClick={()=>pick(i)} disabled={picked!==null}>{o}</button>;
          })}
          {picked!==null && <div className="quiz-hint">{picked===q.c?"✓ ":"✗ "}{q.why}</div>}
          {picked!==null && <button className="rp-cta" style={{marginTop:14}} onClick={next}>{idx+1>=round.length?"See results →":"Next →"}</button>}
        </div>
      )}
    </div>
  );
}
function Verbs(){
  const [mode,setMode]=useState("learn");
  const [open, setOpen] = useState(0);
  const [q, setQ] = useState("");
  const list = VERBS.filter(v=> !q || v.v.toLowerCase().includes(q.toLowerCase()) || v.m.toLowerCase().includes(q.toLowerCase()));
  return (
    <div className="page">
      <div className="h-hello" style={{fontSize:24}}>Verbs & tenses</div>
      <p className="h-sub">Learn the conjugations, then test yourself with quick fill-in-the-blanks.</p>
      <div className="seg" style={{marginTop:12}}>
        <button className={mode==="learn"?"on":""} onClick={()=>setMode("learn")}>Conjugations</button>
        <button className={mode==="test"?"on":""} onClick={()=>setMode("test")}>Quick test</button>
      </div>
      {mode==="test" ? <VerbTest/> : (
        <>
          <div className="search" style={{marginTop:8}}>
            <span className="si">🔍</span>
            <input placeholder="Search (e.g. 'to eat', 'tener')…" value={q} onChange={e=>setQ(e.target.value)}/>
          </div>
          {list.map((v,i)=>(
            <div key={v.v} className="verb-card">
              <div className={"verb-h "+(open===i?"open":"")} onClick={()=>setOpen(open===i?-1:i)}>
                <div>
                  <div className="vt spk" onClick={(e)=>{e.stopPropagation();speak(v.v);}}>{v.v}</div>
                  <div className="vm">{v.m}</div>
                </div>
                <div className="vx">＋</div>
              </div>
              <div className={"verb-body "+(open===i?"show":"")}>
                <div className="verb-when">💡 <b>When:</b> {v.when}</div>
                {Object.keys(v.t).map(tense=>(
                  <div key={tense} className="tense-block">
                    <div className="tense-t">{tense}</div>
                    <div className="conj-grid">
                      {v.t[tense].map((row,j)=>(
                        <div key={j} className="conj" onClick={()=>speak(row[0])}>
                          <div className="ce">{row[0]}</div><div className="cn">{row[1]}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
                <div className="verb-ex">
                  <div className="veh">Examples · tap to hear</div>
                  <ul>{v.ex.map((e,j)=><li key={j} onClick={()=>speak(e.split("(")[0])}>{e}</li>)}</ul>
                </div>
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

/* ================= PRONUNCIATION ================= */
function Pron(){
  const [tab, setTab] = useState("accents");
  return (
    <div className="page">
      <div className="h-hello" style={{fontSize:24}}>Pronunciation</div>
      <div className="accent-box" style={{marginTop:14}}>
        <h3>🌎 Cuban vs Colombian — what to expect</h3>
        <div className="accent-row"><span className="accent-flag">🇨🇺</span>
          <div className="at"><b>Cuban</b> is fast and musical. They often <b>drop the S</b> at the end of words — "estás" sounds like "etá" — and shorten "para" → "pa'". This is why his family can feel hard to follow.</div></div>
        <div className="accent-row"><span className="accent-flag">🇨🇴</span>
          <div className="at"><b>Colombian</b> (especially Bogotá) is one of the clearest accents in Latin America — slower, most letters fully pronounced. Great for building your ear before decoding Cuban speed.</div></div>
        <div className="pill-tip" style={{marginTop:4}}>💡 Didn't catch it? Say <span className="spk" style={{textDecoration:"underline",cursor:"pointer"}} onClick={()=>speak("¿Me puede repetir más despacio?")}>"¿Me puede repetir más despacio?"</span> Nobody minds.</div>
      </div>
      <div className="seg">
        {[["accents","🇨🇺 vs 🇨🇴"],["vowels","Vowels"],["tricky","Tricky letters"],["practice","Say it aloud"]].map(([k,l])=>(
          <button key={k} className={tab===k?"on":""} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      {(tab==="vowels"||tab==="tricky") && (
        <>
          <p className="h-sub" style={{margin:"4px 2px 8px"}}>{tab==="vowels"?"Spanish vowels never change — master these 5 and you can sound out anything.":"These trip up English speakers most. Tap to hear each one."}</p>
          <div className="pron-grid">
            {PRON[tab].map((v,i)=>(
              <div key={i} className="pron-card" onClick={()=>speak(v.say)}>
                <div className="pron-l">{v.l}</div>
                <div className="pron-r">{v.r}</div>
                <div className="pron-p">"{v.p}"</div>
                <div className="pron-ex">{v.ex}</div>
              </div>
            ))}
          </div>
        </>
      )}
      {tab==="accents" && (
        <>
          <p className="h-sub" style={{margin:"4px 2px 8px"}}>Same phrase, two accents. The 🇨🇴 version is clear and fully pronounced; the 🇨🇺 version drops sounds (especially the S) and runs the words together.</p>
          <div className="pill-tip">🔊 Tapping plays the clear version — the 🇨🇺 line shows how it actually lands on your ear.</div>
          {ACCENTS.map((a,i)=>(
            <div key={i} className="acmp">
              <div className="acmp-es spk" onClick={()=>speak(a.es)}>{a.es} 🔊</div>
              <div className="acmp-en">{a.en}</div>
              <div className="acmp-row co"><span className="acmp-flag">🇨🇴</span><div><div className="acmp-lab">Clear / Colombian</div><div className="acmp-say">{a.co}</div></div></div>
              <div className="acmp-row cu"><span className="acmp-flag">🇨🇺</span><div><div className="acmp-lab">Cuban</div><div className="acmp-say">{a.cu}</div></div></div>
              {a.why && <div className="acmp-why">{a.why}</div>}
            </div>
          ))}
        </>
      )}
      {tab==="practice" && (
        <>
          <p className="h-sub" style={{margin:"4px 2px 8px"}}>Tap a card to hear it, then say it back out loud.</p>
          <div className="pron-grid">
            {PRON.practice.map((v,i)=>(
              <div key={i} className="pron-card" onClick={()=>speak(v.w)}>
                <div style={{fontFamily:"var(--serif)",fontSize:17,fontWeight:600}}>{v.w}</div>
                <div className="pron-p" style={{marginTop:6}}>{v.p}</div>
                <div className="pron-ex" style={{fontStyle:"normal"}}>{v.m}</div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ================= SETTINGS SHEET ================= */
function ResetLink({reset, toast}){
  return <button className="list-link" style={{marginTop:18}} onClick={()=>{
    if(confirm("Reset all progress (streak, XP, mastered cards)? This can't be undone.")){
      localStorage.removeItem(KEY); location.reload();
    }
  }}>
    <div className="li" style={{background:"var(--bad-soft)"}}>🗑️</div>
    <div><div className="lt">Reset progress</div><div className="ld">Clear streak, XP and card history</div></div>
    <div className="chev">›</div>
  </button>;
}

/* ================= ROOT ================= */
function App(){
  const P = useProg();
  const [tab, setTab] = useState("home");
  const [theme, setTheme] = useState(()=> localStorage.getItem("hablar_theme") || "light");
  const [toastMsg, setToastMsg] = useState("");
  const toastTimer = useRef(null);
  const toast = (m)=>{ setToastMsg(m); clearTimeout(toastTimer.current); toastTimer.current=setTimeout(()=>setToastMsg(""),1900); };

  useEffect(()=>{ document.documentElement.setAttribute("data-theme", theme); localStorage.setItem("hablar_theme",theme); },[theme]);

  const potd = useMemo(()=>{
    const all = Object.values(DECKS).flatMap(d=>d.items);
    const day = Math.floor(Date.now()/864e5);
    return all[day % all.length];
  },[]);

  const nav = [["home","Home","🏠"],["learn","Cards","🗂️"],["scenarios","Talk","🎬"],["listen","Listen","👂"],["quiz","Quiz","🎯"]];
  const showTab = (tab==="verbs"||tab==="pron"||tab==="browse"||tab==="myphrases") ? "home" : tab;

  return (
    <div>
      <div className="topbar">
        <div className="brand">
          <div className="brand-mark">H</div>
          <div className="brand-name">Hablar<small>Spanish for real life</small></div>
        </div>
        <div className="topbar-right">
          <div className="streak-chip">🔥 {P.prog.streak||0}</div>
          <button className="icon-btn" onClick={()=>setTheme(theme==="light"?"dark":"light")}>{theme==="light"?"🌙":"☀️"}</button>
        </div>
      </div>

      {tab==="home" && <><Home prog={P.prog} go={setTab} phraseOfDay={potd}/><div style={{padding:"0 20px"}}><ResetLink/></div></>}
      {tab==="learn" && <Learn prog={P.prog} rate={P.rate} toast={toast} toggleSave={P.toggleSave}/>}
      {tab==="scenarios" && <Scenarios prog={P.prog} finishScenario={P.finishScenario} toast={toast}/>}
      {tab==="listen" && <Listen setListenBest={P.setListenBest} addXp={P.addXp} prog={P.prog} toast={toast}/>}
      {tab==="quiz" && <Quiz setQuizBest={P.setQuizBest} addXp={P.addXp} prog={P.prog}/>}
      {tab==="verbs" && <><div style={{padding:"14px 20px 0"}}><button className="back-btn" onClick={()=>setTab("home")}>‹ Home</button></div><Verbs/></>}
      {tab==="pron" && <><div style={{padding:"14px 20px 0"}}><button className="back-btn" onClick={()=>setTab("home")}>‹ Home</button></div><Pron/></>}
      {tab==="browse" && <><div style={{padding:"14px 20px 0"}}><button className="back-btn" onClick={()=>setTab("home")}>‹ Home</button></div><Browse/></>}
      {tab==="myphrases" && <><div style={{padding:"14px 20px 0"}}><button className="back-btn" onClick={()=>setTab("home")}>‹ Home</button></div><MyPhrases/></>}

      <Toast msg={toastMsg}/>

      <div className="bottomnav">
        {nav.map(([k,l,ic])=>(
          <button key={k} className={"navbtn "+(showTab===k?"on":"")} onClick={()=>setTab(k)}>
            <span className="ni">{ic}</span>{l}
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
